body:
  text: 運甓漫稿别集類五明提要臣等謹案運甓漫稿七巻明李昌祺撰昌祺名禎以字行廬陵人永樂甲申進士選庶吉士授禮部郎中按明初六科皆有庶吉士不止翰林有之故得以直授郎中厯官廣西河南左布政使事迹具明史本傳是編皆古近體詩並詩餘乃天順三年吉安教授鄭綱所編史稱昌祺預修永樂大典凡僻書疑事人多就質其詩清新華贍音節自然陳循序稱其本之以理充之以氣故雅淡清麗宏偉新竒無不該偹不必逺較於古就今而論千百之中不過數輩曹安讕言長語極推其題文丞相研一首朱彛尊靜志居詩話亦謂李禎詩務謝朝華力啟夕秀取材結體頗與段柯古相似葢由其一變綺靡纎巧之習而以流逸出之故别饒鮮潤逈異庸蕪鄭瑗井觀瑣言乃曰李布政昌祺人多稱其剛毅不撓嘗觀其運甓詩稿浮艶太逞不類莊人雅士所為所謂棖也慾焉得剛云云是梅花一賦足累宋璟之生平矣執文章正宗一編以進退古今之作者不亦隘乎惟其中騶虞歌汴城閲武諸篇或稍傷俚俗然論一篇之詩當字銖句兩而求之論一家之詩則當統觀其全局不以一二章定工拙也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d76d74eb9da4a02b7f8e909f8e2f3269d46f8dd4ab88defe84a847816cc92bd7
