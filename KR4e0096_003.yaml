body:
  text: 運甓漫稿卷三明李昌祺撰五言律詩登天華觀玉洞開仙館丹梯軼世氛天書餘鳥篆雲笈護龍文靈境蕭臺近空歌下界聞俗人如可避不必問桃源春日山中尋泉春泉試獨尋度壑復穿林忽見流紅逺方知入翠深色渾因悟雨聲淡只宜琴盥弄忘歸去窮源空有心擬唐塞下曲八首沙塵漲北天衛霍出居延苦霧埋沙磧窮荒乏水泉戰酣鼙鼓壯戍久鐵衣穿試上長城望中原若箇邊羽箭鴈翎刀風沙北地豪弓開關月滿鵰沒陳雲高徑騎三邊出胸奴一夕逃將軍方得意新拜璽書褒鐵騎蹴交河銜枚半夜過雪花凝鎖甲月色冷雕戈小醜俱亡命連營盡凱歌至今青塜骨猶恨與通和十五去防秋于今已白頭一身猶是卒諸將久封侯部伍嫌羸病親知識壯遊寒燈孤戍裏揮淚看吳鈎久在邊城裏風霜不可論六親皆骨朽百戰偶身存烽燧連天暗沙塵憚日昏征人家萬里誰弔國殤魂犬戎窺近塞羽檄發精兵不識沙場苦焉知性命輕饑鷹投古壘疲卒卧空營日暮轅門裏愁聽鼓角聲塞馬嘯悲風旌旗慘淡中衛青持左鉞李廣在前鋒壯士俱亡命朝廷重論功將軍承寵詔天子錫新封秋霜劍在腰曾事霍嫖姚諸將威無敵全軍氣不驕弓鳴驚過鴈炮響走棲貂敢憚窮邊苦天家雨露饒大漠隂山外霜天氣候殊隂沙明逺燐寒日慘窮廬北闕無來使中原少得書凱歌今未奏壯士誓捐軀病起遣興羸弱怯衣單徐行覺尚難平和欣脉復疏懶喜身閒古硯從教洗孤琴久未彈朝衣如可解歸去卧秋山送人南歸四首離絃兼楚調忍向醉時聞連嵗長為客他鄉更别君鷗波明夕照鴈字寫秋雲迢遞還鄉夢相隨過海門百年同旅寓大半在殊方白髮羞明鏡青山問故鄉落霞秋水濶新鴈暮天長安得隨君往溪南訪草堂候館停杯處扁舟欲發時歸帆投逺浦斜日隱層陴暑退秋來早潮生月上遲經行逢勝槩都付酒兼詩年年長在客北薊復南京秋雨滄洲鴈春風采石鶯好山環故里流水背孤城去住無拘繫閒身到處輕夜坐彭贊禮竹塢二首獨坐依修竹秋聲近户多疏鍾清紫禁凉露濕銀河野飯思薇蕨儒衣想芟荷小山招隱意藂桂有遺歌靜夜凉風動林疏宿鳥驚玉繩低萬户銀漢轉三更露重絺衣薄香浮茗碗清班姬紈扇曲此際最關情送沈太守之雲南滇陽南望逈五馬引雙旌鳥道雲邊斷猿聲月下清黔江通逺海僰樹擁孤城已是諸侯貴毋論萬里行送謝明府之桃源楚地佳山水桃源境更幽汀蘭行處採湘水抱村流門掩山城暮蟬鳴驛樹秋昔人遺洞在騎馬一來遊紅葉染樹初凝茜連林漸積丹露藂消黛色霜片妬朱顔菊避重陽艷花羞二月殷娥眉爭拾取題字寄人間送周編修姪還文江落景照離筵華音促别絃老親長日念遊子幾時還玉雪中郎貴青春小阮賢重來拾瑶草遲爾五雲邊送王僉事之湖廣江漢維南紀星辰近太微地分方嶽重官到憲臺稀逺水連秋濶輕帆徹夜飛人生驄馬貴好是繡為衣寄劉三髦五首劉子窮經處柴門野水濱俗人那可到往哲自相親道在寧論命家空不歎貧幽棲如可遂遲子結南鄰吾愛劉公子渾如漢士風古心真自得髙操更誰同緑水溪邊舫朱絃膝上桐我慚簪組纍不得逺相從濯足清潭裏移家碧澗邊非關傲軒冕自是愛林泉野鶴閒同往溪雲靜與還東山謝安石何日起髙眠才俊青雲早嗟君獨出遲寧甘身未達不與世相知霜月鄰僧磬凉風野客棋懷人在天末無地寫幽思剡書多日下猶卧碧山隈只歎相如病空淹賈誼才窗虛雲自宿門掩鶴初回好在禾川上應愁驛騎催題世德樓髙樓無四鄰䦨檻逼秋旻創造懷先代登臨屬後人水雲供逺眺山月共清貧羡爾丘中士雲霄寄此身送王知州赴祿勸行盡天涯路黔南尚幾州孤城藏萬壑殘月在扁舟劍閣雲邊斷巴江樹杪流兩回經鳥道應記舊曽遊送梁僉事還蜀二首臘盡催行色天涯起别愁暮雲遮雨濕寒水帶氷流鳥道青驄馬烏臺紫豸裘漢廷諸俊彥風裁范滂優行人冒曉霜白簡繡衣裳復任辭三殿觀風動一方秋林黃葉暗春水碧芹香杜子留遺跡煩君訪草堂送劉教諭還沛縣相望渾未逺相㑹竟難常交態貧如故離情醉暫忘淮流通海近豐樹入雲長羡爾官非賤橫經漢祖鄉送人還永豐二首迢遞京華道蕭條嵗晏時江風寒釀雪淮水夜流澌逺浦帆來小殘鍾烏去遲瀧岡天下重歐子有穹碑臘盡促歸橈離魂黯欲消故園頻在望知己邈難招燈火江村市梅花野岸橋行邊憐寂寞况值雨蕭蕭送鄧宗經還永新訓導二首相逢疑是夢乍見總堪憐良㑹來天上長貧在客邊青雲違故舊華髮感流年明發征帆去依然各一天十載留京國三年别故人賈生猶未達鄭老尚居貧燈火黌宫夕菰蒲野水春誰知他域别凄斷更傷神寄蕭教諭三首見說崑山縣孤城在水鄉汐潮通海近雲樹接吳長夏暑墟田􅌻秋隂學舍凉年年春色裏桃杏爛宫墻縣齊蒲葦裏鷗鷺與相親衆水春環舍孤峰晚對人海鮮便久客儒服稱閒身肯念同袍者緘書莫厭頻身名俱未達朋舊故應疏多病惟髙枕何人慰索居縱鱗思曠野疲馬倦長途誰似儒官好優游翰與觚耕樂亭二首孤亭臨敻野空濶四無鄰車馬來遊少農夫就餉頻晴簷鳩喚雨社甕鳥啼春竊祿真何補投簪愧野人苔痕臨水潤樹葉近秋稀細雨羣農集殘陽一鳥歸村童收滯穗野老候空扉亦有躬耕意青莎擬製衣送人還永豐三首君家簪紱裔羣從玉連枝遊子龍頭貴中郎燕頷姿雙尊論久别千里慰遐思六一遺風在懷哉百世師行李歸期促山川去路遙疾風狂入夜淫雨晦連朝帆逐孤飛鳥江通逆上潮慿將棲遁意鄉國寄漁樵候館促離杯愁顔且强開砌蛩驚露泣巢燕避秋回菊徑深黃葉衡門掩緑苔緬懷西漢士據地獨竒才郊祀齊宿彭太常永年公署二首寂厯容臺署髙吟逸興生泉香春井溢鐘斷夜堂扄清漏隨風度流雲傍月行暫來猶愛此住久轉忘情竹靜風停後瓶香茗熟時燈寒人未寢露冷鶴偏知頗愛良宵靜翻嫌白日遲年年此齊宿載誦我將詩太廟孟秋時享同陸員外齊宿槐露滴新秋齊房夜色幽罷琴期月上捲幔見星流池冷菰蒲靜窗寒竹樹稠清宵容易盡香茗且淹留喜張進士叔豫見宿旅舍窮巷寂無鄰青燈共故人逺聲霜下磬孤影客邊身露冷蛩相弔庭寒月自親殷勤一瓢酒更與話酸辛碧峰寺慎公房碧嶂屏風秀清流束帶圓烟霞醒醉夢鐘梵寤僧禪亂葉當人落孤雲引鶴還聲聞如可契應此息塵緣謝賜西洋布異縷何纎細輕盈玉雪紑鮫宫初織罷海國逺輸來捧拜榮恩賜紉縫稱體裁微軀增照耀被服愧非才竹所二首何地偏多竹翛翛庭院幽夜凉難得月雨過易成秋不厭貧家看那妨好客留緑隂多處坐疑泛渭川舟王子幽棲地蕭森修竹林好風催布席疏雨罷鳴琴天籟醒塵夢凉隂伴醉吟幾竿渾不俗賴爾悅閒心送曹判官蘇州治水二首别駕之官日都城欲夏過一篷畿甸雨雙槳石湖波郭外青山少城邊白水多三吳民墊久拯援術如何聞道姑蘇郡東南近海潮墟田多夏潦場圃减秋苖平易遵前訓煩苛革舊條更應持潔慎玉帛此鄉饒詠蝶栩栩戲晴光留連媚露香舞隨花片白棲共柳絲黃樹杪鶯捎急簾間扇朴忙南園芳草地撩亂逐蜂狂寓舍梅一株翳榛莾中詩以唁之篠蔓翳頺垣娟然玉雪痕寒香偏晚節春色自名園鳥啄梢頭蕊苔沿砌下根猶能異桃李不在狄公門席上贈妓綰霧纎纎指凌波小小蓮春山銀燭下秋水玉尊前舞袖鴛鴦錦歌珠玳瑁筵座間俱狎客惟屬杜樊川送陳生歸吉水赤岸二首清砧兼落葉總是别離情去路千程逺歸舟一葉輕秋雲連樹暗寒日映川明亦有滄浪興何時共濯纓歸心無日夜孤舫不停牽沙蟹寒緣草江豚暝觸船銀河通赤岸翠壁瀉紅泉莫戀幽居好功名貴壯年送周秀才遊長沙迢遞長沙道蕭條晏嵗遊亂山黃葉寺孤棹白蘋洲夕鳥衝船過寒波背郭流毋論卑濕地賈傅昔曽留送周布政還河南出鎮名藩重來朝異眷隆殘年將欲盡知已忽相逢泥淖梁園雨埃塵艮嶽風旬宣如有暇煩弔宋遺宫靈谷寺一徑入青松樓臺峙化宫雨深山果落雲去石床空樹老多巢鶴潭清或見龍上方禪寂地暫得寄塵蹤南溪書屋松竹連村暗軒窗面水清蘚痕留屐齒灘響雜書聲行藥因過寺輸租暫到城靜觀簪紱纍還喜布衣輕周原幽居山色蛾眉秀江流燕尾分亂蟬吟落葉獨鶴引歸雲黃葉溪邊樹青帘雨外村興來留客坐隨意倒芳樽送戴教授北行别路三春雨行舟五兩風花香隨路減柳色上衣濃共是青雲客先成白髮翁離情如逝水萬折亦朝東送張巡檢之雲南弓劍巡荒徼衣冠别上林路經三峽險人到百蠻深枸醬諳夷俗兒童解僰音㸃蒼山色古道便一登臨送人之京上已風光好新晴物色妍青山林下屋緑水鏡中船節換榆烟火花殘穀雨天壯遊逢勝景况覲五雲邊送陳郎中重使西域十首九重辭鳯闕千騎度龍荒寶劍懸秋水珠袍照雪霜泉源隨地少沙磧亘天長人羡皇華使誰知粉署郎天使下邊州青絲控紫騮風雲隨節斾雨露到氊裘斜日羌城晚微風塞草秋壯心知未已萬里快重遊逐水安營晚鳴笳渡磧遲穹廬無舊館行卷有新詩駿骨天生馬竒毛地産獅蕃酋迎候處一曲漢歌詞疊鼓雜鳴笳天風送使槎內臣金鏤帶壯士鐵為檛去路緣青海行營駐白沙單于爭慕義不用李輕車驪馬紫金環行行出玉關懸河三寸舌積雪萬重山旗影連雲卷弓弦向月彎封侯儒者事天子待君還大漠連川逺行人去國遙烏孫遺種在狼望舊名消夜雪戎王帳秋風使者軺懸知専對好談笑欵天驕寶帶懸魚服雕弧掛馬韀皇恩覃萬國兵氣靜三邊瀚海寒生月崖城暮鎖烟欲窮西域事班史有遺編地勢三城逺河源二水分火山稀好雨鹽澤足寒雲鵰沒平沙外駝鳴古澗濆慿髙時引睇何處是中原出塞春乘傳投鞭晚下營旋風邊馬疾掣電皂鵰輕浩蕩窮源志迢遙奉使程支機如得石持往問君平行盡伊吾道遙天氣候殊神僧留白骨毒草隱𤣥蛛近水多行帳窮荒絶逺書竚看歸覲日玉勒控宛駒送李生還安城北薊辭嚴父南京别故人一身勤逺道千里念慈親柳暗江城曉萍香野岸春燈花先報喜應更倚門頻南京送髙教授赴選卿家本同郡客路又離羣夜柝敲寒月霜鐘度暝雲征袍迷草色古嶼帶潮痕寥落分携處秋鴻不可聞共是浮萍跡偏憐鬢易新江湖留滯久朋舊别離頻試數中朝士應多故里親莫嫌氊獨冷年紀政青春鷺渚輕鷗芳洲白鷺名無數白鷗輕暖戲桃花水晴依柳絮萍飛來兼早鴈散去避秋鷹何處忘機客時於此濯纓寄劉孟熙隱者嵓壑幽棲者閒情老不衰露葵緣客折晚稻約僧炊苔徑林風掃松窗嶺月窺詩名兼逸興湖海萬人推次衡州征棹艤衡陽孤城堞雉荒流雲時翳日微雨暝生凉江濶鷗波逺天空鴈字長採蘋無限興烟水晚蒼茫已亥房山除夕營中作殘臘中宵盡孤懷百感深已慚先哲訓徒抱古人心偃息何由得勤勞敢不任寒燈照空榻擁褐謾愁吟患難仍連嵗蹉跎獨此身風塵雙短鬢宇宙一窮人向曙繁星沒凝寒積雪新椒花今夕酒誰壽白頭親稚子捐深愛酸辛痛莫支坐愁侵骨髓行樂負心期風俗殊方異人情近老悲前程駑馬足敢不慎驅馳風雪當除夕空營一榻孤天涯悲䑛犢地下憶童烏寧復衰顔壯惟應淚眼枯大靈如不妄再拜謝𤣥夫今夕猶常夕如何倍憶家二三千里道四十五年華貧有文章在官無品秩加遙知妻共女愁坐卜燈花警柝嚴巡邏寒更獨坐聽凄其孤影瘦邪許萬聲停敗壁風穿葦空庖凌在瓶茫茫天壤內么麼一螟蛉五峰菴住上人房住公棲遁處重到只空臺竹榻無僧掃松關有客來夕陽寒鳥集凉露候蟲哀祗苑猶如此何方免劫灰雨中桃花霡霂過芳園枝枝積淚痕色憐開處