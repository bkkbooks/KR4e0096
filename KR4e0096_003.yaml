軍民向閙尋閒處隨緣寄幻身凡心如未泯林壑亦埃塵虛室原生白寥寥一榻清石壇雲影度金掌露光凝叩齒宫神集齊心道氣澄三尸能斬却鉛汞自然成軒車從擾擾窗户自幽幽藥徑人蹤絶苔階鶴跡留平生雙短屐浮世一虛舟即此堪棲隱何須物外遊春草二首苒苒復萋萋征袍映欲迷暖烟秦苑北寒食杜陵西緑嫩羞鸚羽青柔襯馬蹄南園新雨過畦菜曉爭齊秀色逺相連柔香雨霽天嫩兼蒲葉細濃奪柳條鮮莫把征輪碾留教醉客眠王孫行未返芳意自年年晚登汴城休騎上荒城斜陽萬感并嵗憐頻有旱雷怪久無聲芳樹鳩巢廢香泥燕壘成緬懷前宋士人艷道鄉名郭外野寺野寺逺人烟觚稜殿兀然瓦罏雙足折土偶半身全鳥去階留篆蝸藏壁帶涎閻浮俱苦海何處可安禪立春日作殘厯惟餘晦殊鄉又遇春壯懷灰共冷衰鬢雪爭新頗覺逢迎懶徒思引退頻自緣忘物我何用辨玒珉聞舍弟昌復訃聞訃心先折開緘淚若傾異鄉離别恨同氣死生情哽咽悲何已呻吟痛曷平九京知有憾弱子尚孩嬰曽共過庭前雙親獨爾憐亢宗徒齎志閲世竟慳年忍割今生愛難期再世緣永懷諸弟妹三已在重泉五十年相聚俄驚一夢餘酸辛身後事愁苦病中書苔蘚沙場骨羅紈肉食軀何如終牖下隨分葬郊墟未病猶耽飲方强遽解紳短修元有定聚散本非真蘚碣標荒壟桐棺掩幻身達人曽祼葬那用更傷神春祭陪祀東書堂賜茶退歸作香篆半成灰齊宫賜坐回苑花紅未拆階草緑先催棋布星羅局茶傾雪泛杯非才叨嶽牧明祀幾畨陪偶然作謬忝藩維寄空慚老病身鬢髭愁裏雪花柳客邊春直道乖流俗餘生任化鈞時無鄒孟氏枉直向誰詢三月四日即景忽忽春將暮俄過三月三草誰憐益母花自媚宜男乍到尋巢燕初眠上箔蠶新茶與新筍鄉味憶江南合歡牡丹三首應教作爛熳絢晴朝容華若賽嬌瓣多愁露浥幹弱怯風搖共訝晨粧淡都緣宿酒消更期千嵗壽嵗嵗賞妖嬈花艷奪霞紅葩分嫵媚同鬬妍雲錦幄競秀綺羅藂淑質俱傾國凡英盡斂容內庭和氣盛卉草最先鍾曉露濕芳英駢開耻獨榮仙姿雙弄玉道韻兩飛瓊人羡長偎倚天令巧合并鵲巢風化美佳植固堪徴合歡芍藥二首奉教作名品擅維揚嫣然共頡頏總專傾國艷難辨是誰香窈窕千般態娉婷一種粧螽斯端有兆宜爾預呈祥樓子花王副根同蒂亦連固知皆雅淡孰敢别蚩妍繡閣雲鬟並粧臺月貌聨暖風香霧裏向背總堪憐題小景四首南北兩峰前逢春物物妍露桃臨水岸烟柳隔江船古廟尋嘉澤幽亭訪冷泉遊人都載酒來往六橋邊芳樹垂巖暗藂篁傍石低虹流雙澗逺笏卓數峰齊棋許髙人對琴教小豎携湖山皆秀麗無處不堪題窈窕洞無門寥寥隔世氛板橋穿竹篠苔壁綴松根孤嶂摩雲秀飛泉觸石喧不知何道士收露㸃𤣥文積素晃溪山人家盡掩關客舟寒尚挽漁槳暝初還老樹髙低岸殘蘆曲折灣欲投峰頂寺氷滑路難攀和友人韻山暗雲霾樹潮生水到門野航乘一葦村釀醉孤尊夜火燃松節晨餐煮芋根自諳棲遁志富貴不須論荷衣蘭作佩藥檻席為門淡泊幽情逺真淳古道尊花飄仁在核葉落液歸根消息盈虛理當從達者論地險過牛渚林幽類鹿門戀兹耕釣樂忘却縉紳尊掃石安茶竈携書坐竹根衰榮相倚伏天道妙難論寄南昌沈大尹杖屨歸田日山林養病時缶無陶令粟笈有杜陵詩蒲柳身空老松筠性不移何由重㑹面相與話襟期終日惟枯坐衡門掩薜蘿自緣知已少謾道識人多往事心徒赤浮生鬢已皤久思餐杞菊作賦續東坡昔出别鄉親今還少四鄰天留雙眼在人笑一身貧勇退慚先哲相知感故人平生堅白意未肯涅緇塵題終慕堂舊隱金鰲下榕蕉間橘林他鄉頻引睇先壟鎮縈心世澤溪流逺哀情海水深楹間懸巨榜一顧一沾襟自憐成永感那得再晨昏掛壁遺容在紉衣密線存秋霜心易愴春雨恨難論一脉書香逺相傳子又孫燎黃褒典重純素此生孤長抱窮天痛仍懷永世圖祿豐親不逮泣盡眼將枯子職知能勉移忠仰聖謨運甓漫稿卷三
