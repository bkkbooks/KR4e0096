body:
  text: 運甓漫稿巻六明李昌祺撰五言絶句葵花葉露曉瀼瀼高藂繞砌傍孤吟㸔不厭只為解傾陽榴花花蹙紅巾艶枝攢緑葉深開軒閑玩久聊悦病來心獨坐病來成懶惰兀兀惟孤坐火冷篆煙消風簾柳花堕官舎門巷少人來閑堦長緑苔石榴三五樹樹樹手親栽鶯溜亮語交交閑枝且托巢鷹鸇尚黄口側目在高梢燕葺壘去來忙嘍嘍語夕陽茅簷最安穏莫戀杏為梁詠小室前孤樹髙枝已出墻新葉方舒翠賴爾豁憂懐朝朝坐相對七言絶句題道士黄宇中小景赤鯉洲前紫極宫盡無桃樹只青松風光不似𤣥都觀也有遊人到此中滿地涼隂滿徑苔梨花開遍橘花開山門竟日無雲鎻挈榼擕壺任客來飲罷庭前樹影移城南城北路多岐丁寧少長忙歸去莫待雲深日暝時竹樹蕭森白晝清人間此是小蓬瀛黄冠只説修行好争奈浮生戀世情天壇職籙本清高戒行寧容失一毫為謝門前相過客若還要學恐徒勞六根變幻苦縈纒道長魔高自昔然倘使飛昇容易得世間誰不是神仙微雨行秋送嫩涼蕋珠誦罷禮虚皇􅋜􅋜一枕蒲圑睡便是長生不死鄉多少全真去坐圜原來與已不相闗若非親見張平叔四百金丹也是閒重之京舟中夢覺作數行清淚不禁揮北去南來計總違夢裏不知今又别對人猶自説初歸茶陵夜泊山抱荒村水背城篛篷藤簟聽灘聲秋風淅瀝秋江冷人自思家月自明廣西公廨夜宿白月紛紛照屋梁羈懐無寐對清光浮雲不掩團團影只與離人照夜長贈太常張丞山水圖十三首瀟灑茅堂水石邊青青草色滿簾前經旬不出縁何事冩就黄庭内景篇千峰萬壑翠嵯峨車馬長年少見過泉可濯兮田可稼比儂盤谷不爭多秦中本自好溪山况在終南鄠杜間占得林泉清勝處投簮莫待老方還楝花風過水平堤兩兩林鳩屋上啼因㸔青山門忘掩浮雲直到榻前棲白石蒼苔一徑通軒忩涼逗煑茶風時時吹落林花片滿地深紅間淺紅隔塢炊煙半有無東鄰西舎往還踈蒼蒼茂樹娟娟竹何處人家似此圖山深地僻夏如秋門巷蕭條竹樹幽步過溪南㸔晚景牧童吹笛倒騎牛荷繞清溪柳繞莊時時濯足向滄浪不知水鳥縁何事飛去飛來自底忙樹樹榴花爛漫開堦前鶴跡印蒼苔銜泥燕子歸飛急風送前山驟雨來雲屛四面翠周遭松桂隂濃野竹高比似武陵應更好溪邉只欠㡬株桃墻頭柳嫩緑毿毿橋下新流色勝藍扶杖出門縁送客飛花㡬片㸃春衫閒心只與靜相宜醉似踈狂醒似痴除却㸔山㸔水外是非榮辱不曾知年來兩鬢雪蕭蕭懶把黄金帶繫腰擬向江南尋舊隠白雲莊上狎漁樵楊柳枝春來婀娜裊煙青花落春江化作萍隨水東流飄泊去比郎蹤跡更無憑參差㡬樹瞰長河樹樹垂金拂緑波不是秋來易零落自縁人世别離多細葉如眉緑未勻修眉渾似帶愁顰輸他桃杏東風裏不管南遊北去人揺青曳緑汴河邊濃比征袍色更鮮謾有柔條千萬縷如何不解繫郎船題喜鵲圖二首一雙飛下立斜暉特地查查近繡幃笑倚緑忩聴未了小鬟低語報郎歸對立梅梢似欲鳴含情傾聴却無聲摩挲醉眼行前㸔不是生成是畫成送人還鄉淮水寒潮起暮雲紛紛離思不堪論都門不閉還鄉夢昨夜分明到故園經鳳臺門鳳凰岡上閒原少舊塜新墳次第排黄壤豈能分貴賤輿臺將相一般埋醉中遣興眼前無物不關情濁酒從教醉復醒醉裏不知為客久金陵却道是廬陵秋日對菊席有塵埃徑有苔舊時知己少曾來多情獨愛庭前菊肯不羞貧嵗嵗開遊靈谷寺十丈浮屠萬疊山誰移兠率下人寰非因酷愛僧房好貪㸔青松忘却還送别壺傾酒盡棹歌催日影平西送騎回最是秋風憐客别沙頭緩送布帆開江上作野水浮雲任所之渚鷗汀鷺識心期閑身到處貧無物只有唐人㡬巻詩題五峰僧寺悼住此庵上人旅食京華七度秋重來無處覔湯休萬株松樹千竿竹夢寐平生舊此遊悼王翁二首隨分棺衾足掩身不勞弔客嘆家貧白頭贏得青山葬多少寒沙暴骨人海上歸來牖下終去時同伴葬遼東重泉莫嘆桐棺薄玉匣籧篨等是空重遊龍濟寺悼無為能上人北涉南遊二十霜幻身重到贊公房苔侵素壁松枝偃獨自焚香拜影堂小忩夏日即景樹影輪囷日影微槿花爛漫芷花稀青蠅不畏儒衡扇何處爭來撩亂飛朱給事自南中回相過瘴海歸來話舊遊低頭長揖淚交流傷心忍説來時事半里盤灘萬髑髏􅈞峰老僧南禮曹溪北五臺雙眉覆面眼慵開不知僧臘今多少庭檜參天手自栽宿正覺寺僧房露鶴寒猿永夜清山僧入定泯羣情幽人獨向堦前坐為惜千峰好月明北京送人南歸二首衣染緇塵鬢欲華病身飄泊在天涯角聲吹斷還鄉夢只到金陵不到家宦況鄉心共寂寥秋蓬涼葦總蕭蕭西風似欲留人住吹得垂楊挽去橈客夜聞砧荒草蕭蕭郭隗臺清砧明月兩堪哀千愁百感多如雨今夜燈前一併來房山旅舎枕寒衾冷對孤燈室似郵亭􅖩似僧清淚㡬行揩又落斜風細雨送殘更歸次吕梁洪吕梁洪水激衝波桂楫蘭橈此處多去日少年歸日老人生能得㡬回過泊龍潭南轅北轍盡何求鬢不如霜不肯休輸却江天漁婦火尋常夜夜照扁舟西園精舎社近芳花爛漫開不關風雨自沾苔幽禽驚避蒼鷹逐亂入香紅颭下來村舎燕壘破頻頻旋補泥雙飛雙語更雙棲雕梁雖貴茅簷穏暮去朝來莫怨低洧川田翁辛勤雨壟復煙疇醉卧槐隂石枕頭少小為農今老大不曾騎馬只騎牛田婦諳盡條桑與藝麻豈知城市有繁華年年㸔得蠶絲熟不入貧家入富家宿金鄉鋪寂寞郵亭户半扃茅茨破處見踈星四無鄰舎輿臺睡露自成霜水自氷興國寺與僧話禪僻性長嫌驛舎喧蒲團到處宿祗園機鋒已被曼殊逗可是毘耶更有言許州城外蓼折荷枯柳葉空荒畬斷壟見羣農登龍門館今何處古木棲鴉夕照紅曉行月華清淡露華零喔喔雞聲轎上聴爭似釣魚船底睡蘆花被暖酒初醒江渚見鴛鴦相隨相顧復相親端的韓憑是汝身莫向汀洲交頸宿江邉方有獨行人舞陽留侯廟二首信族豨夷越醢躬太平無復用英雄高皇却堕先生計世上何曾有赤松人心變幻㡬千般帶礪盟深亦易寒秦網逃來逃漢網誰將此意語蕭韓重宿僧寺三首人稀院靜户長扃清磬泠泠已厭聴欲滌平生塵土念半函圓覺貝多經荒城晏嵗野僧房迢遞他鄉憶故鄉病骨不禁風雪冷一更渾似一旬長空房不見欵冬花簷鐸㪣風日影斜隨意看來隨意脱緋袍那似佛袈裟鵞鴨池水面殘氷漾淺漪臨流駐馬立多時不因常侍成竒蹟千載誰知有此池滎陽懐古廣武城邉古戰塲漢高曾此割封疆若無紀信乘黄屋縱有蕭韓事叵量新安謠三首新安野老髪垂肩説著先朝淚泫然洪武初年真少事㡬曾輕到縣衙前垂老頻逢嵗薄收秋租多欠賣耕牛縣官不暇憐飢餒喚拽官車上陜州當夫當匠子孫亡田地荒蕪户有糧昨日迤西蕃使過盡驅婦女趕牛羊山路謔花枝頭地上摠猩紅㡬樹繁開㡬樹空顔色一般榮悴異誰將此意問東風花答多謝天公著意栽不教粧㸃艶亭臺無人剪折無人賞贏得年年自在開題怪石牡丹孔雀圖不上屏風不用憐鈿毫金縷爛相鮮雙瞳贏得無人射翹立花妃石丈前山中見牡丹不嫌惡雨并乖風且共山花作伴紅縱在五侯池館裏可能春去不成空重唁山中牡丹不煩澆灌不煩栽長過清明穀雨開為問洛陽豪貴客㡬家還有舊亭臺過張茅鎮見飢民土洞深沈土坑欹田園枯旱廢耕犁一身餒困渾無力猶上高梯剥樹皮宜陽山中緑隂重疊鳥間關野棗花香宿雨殘天遣浮雲都捲盡教人一路看青山嵩陽道中度盡青山㡬百重垂蘿翳日鳥啼風不嫌幽獨無人伴長在花香樹色中四月八日寓陜州僧舎白楊新葉嫩蕭蕭野寺春歸更寂寥曉殿敲鐘僧俗佛鶻崙柏子滿爐燒小滿日口號久晴泥路足風沙杏子生仁楝謝花長是江南逢此日滿林煙雨熟枇杷宿襟山寺竹樹隂隂覆化城白蓮池水照人清明朝又向紅塵去辜負垂楊百囀鶯嵩縣過端午老大偏多故里心一逢佳節一沾襟誰知此日菖蒲酒又在山城獨自斟題老馬圖生來骨相本拳竒無復騰驤似昔時太僕憐才如見惜只教閑放莫教騎光州公館夜宿病身堪嘆復堪憐一盞寒燈照客眠雨滴芭蕉風撼竹蕭蕭瑟瑟破忩前題風柳喜鵲圖贈人二首春光淡蕩景遲遲特地飛來噪柳枝應是高門多喜事殷勤先報主人知宿雨朝來乍放晴游絲裊處暖風輕緑楊深院人初起笑聴喳喳第一聲梨花錦鳩圖二首參差雪蕋漸開齊山鳥梳翎自在棲絶似江南春二月杏花踈雨一雙啼能言鸚鵡閉金籠爭似鉤輈野樹中贏得人嫌生性拙梨雲影裏立東風秋塘鶺鴒圖二首斜日輕煙水渺茫鶺鴒相對立蓮房吳儂只愛吳中好彭越蝤蛑使斗量波漂菰米滿滄洲菱葉蕭踈藕葉秋日暮採蓮人散後雍渠飛下水悠悠梔子畫眉圖二首薝蔔初開雪亞枝枝頭好鳥立成痴少年京兆風流處似汝花間對語時昔年曾伴董嬌嬈長把春山笑倩描今日梁園空見畫鳥啼花落鬢蕭蕭桃花鸂􅈑圖二首南湖二月雨晴天兩兩相隨錦翼鮮記得曾於何處見桃花浪裏釣船邉杜若靡蕪緑滿洲東風春水拍天流雙禽不受人拘束宿食飛鳴得自由紫薇堂獨坐二首游絲落絮墜空堦黄鳥交交在緑槐獨對薇花清坐久衙前初換午時牌兩行官樹晝隂濃吏散長廊退食鐘忽見飛來楊柳絮始知春色八分空秋雨夜聞鄉中近事殊可感得失無心總不驚秋來偏動故鄉情尋常忩外梧桐雨不似今宵不耐聴盧翁挽詩二首老向夷門受一㕓閒身自在水雲邉大梁城裏人無數若箇如翁八十年名利無心任鬢皤天留兩眼閲人多懸知地下應含笑得見兒登進士科宣徳堂前種桃二株戯作緋桃兩樹逺移來親向堦前著意栽自是不如棠蔽芾謾留春色艶亭臺謝惠牡丹不將華屋薦金盤鈿合盛來露未乾麗色穠香都負却空齋鎮日寂寥看客夜聞雨蕭蕭颯颯五更頭滴碎寒聲落瓦溝縱是客懐寛似海也應難著許多愁鄉人至夜話形容不識識鄉音挑盡寒燈到夜深故舊憑君休更説老懐容易便沾襟憶故園山荘病身長是戀家鄉短髪那堪著六梁只憶山荘松樹下鳥啼清晝午隂涼題竹兩竿蕭灑墨淋漓師法東淮顧定之却憶紫薇堂後坐翠隂搖曳午晴時解籜新梢緑未全一枝斜出更娟娟錢塘太史春風筆移得瀟湘到几前題蘭垂垂一簇石崖旁雅韻幽姿冠楚芳天不遣生平地上可憐分付許多香隂崖石髄養根芽半吐全開總是花謾有國香誰見採美人迢逓在天涯沅湘三月雨嘈嘈長得新苗尺許高惟有江潭憔悴叟行吟收拾入離騷懶共江籬杜若榮聊依蘚石寄幽情試觀種在堦庭者未必天然似此清寂寞孤藂棘石邉自榮自悴自清妍空山零落知多少垂老㸔圖一慨然湘女祠前半夕暉採芳紉佩志空違年年緑遍東風裏腸斷王孫去不歸題牡丹清平新調緩聲歌醉眼懵騰㸔錦窠今日江南林下見滿頭白髪淚流多海霞紅吐散天香艶態嬌恣壓衆芳嵗嵗殷勤分百朶東風回首斷人腸玉盤盂帶露華輕别是風流一様清可惜種花人已去觀圖惆悵不勝情平生同有愛花心每到開時輒共吟垂老凄凉空見畫人間何處覓知音濟寧夜泊踈星斜月在扁舟寒鼔鼕鼕出郡樓最憶往年何處聽長安門外五更頭獻陵挽歌臨朝甫及半年餘恵化仁恩遍九區鑾輅仙遊驚太早普天臣妾痛何如宵衣纔見坐明堂忽報承雲返帝鄉父老白頭相對泣餘生垂死待成康四海謳歌仰戴深驚聞厭代盡沾襟惟餘蜂螘偏愁苦無路攀髯痛不禁萬姓空銜喪考哀宫車不見六龍回金河河水都成血盡是臣民淚灑來去國多年别九重草茅名姓簡宸衷此生何處瞻天表惟有清宵夢寐中天語褒嘉百辟聞升沈回首一時分憐才誤到芻蕘質萬死難酬不世恩宵旰憂勤日萬㡬豈知猶不忘寒微恩榮尚在鑾輿逺忍抱遺弓淚滿衣别周布政兩歳勤勞曉夕同忍將别淚灑東風伏波門外還珠洞載酒登臨盡屬公運甓漫稿巻六
