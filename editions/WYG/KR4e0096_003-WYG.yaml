body:
  text: 運甓漫稿巻三明李昌祺撰五言律詩登天華觀玉洞開仙館丹梯軼世氛天書餘鳥篆雲笈䕶龍文靈境蕭臺近空歌下界聞俗人如可避不必問桃源春日山中尋泉春泉試獨尋度壑復穿林忽見流紅逺方知入翠深色渾因悟雨聲淡只宜琴盥弄忘歸去窮源空有心擬唐塞下曲八首沙塵漲北天衛霍出居延苦霧埋沙磧窮荒乏水泉戰酣鼙鼔壯戍乆鐵衣穿試上長城望中原若箇邊羽箭鴈翎刀風沙北地豪弓開闗月滿鵰没陣雲高勁騎三邊出匈奴一夕逃將軍方得意新拜璽書褒鐵騎蹴交河銜枚半夜過雪花凝鎻甲月色冷雕戈小醜俱亡命連營盡凱歌至今青塜骨猶恨與通和十五去防秋于今已白頭一身猶是卒諸將乆封侯部伍嫌羸病親知識壯遊寒燈孤戍裏揮淚看吳鈎乆在邊城裏風霜不可論六親皆骨朽百戰偶身存烽燧連天暗沙塵憚日昏征人家萬里誰弔國殤魂犬戎窺近塞羽檄發精兵不識沙塲苦焉知性命輕饑鷹投古壘疲卒卧空營日暮轅門裏愁聽鼔角聲塞馬嘯悲風旌旗惨澹中衛青持左鉞李廣在前鋒壯士俱亡命朝廷重論功將軍承寵詔天子錫新封秋霜劍在腰曾事霍嫖姚諸將威無敵全軍氣不驕弓鳴驚過鴈砲響走棲貂敢憚窮邊苦天家雨露饒大漠隂山外霜天氣候殊隂沙明逺燐寒日惨窮廬北闕無來使中原少得書凱歌今未奏壯士誓捐軀病起遣興羸弱怯衣單徐行覺尚難平和欣脉復疎懶喜身閒古硯從教洗孤琴乆未彈朝衣如可解歸去卧秋山送人南歸四首離絃兼楚調忍向醉時聞連嵗長爲客他鄉更别君鷗波明夕照鴈字寫秋雲迢遞還鄉夢相隨過海門百年同旅寓大半在殊方白髪羞明鏡青山問故鄉落霞秋水濶新鴈暮天長安得隨君往溪南訪草堂候館停杯處扁舟欲發時歸㠶投逺浦斜日隠層陴暑退秋來早潮生月上遲經行逢勝槩都付酒兼詩年年長在客北薊復南京秋雨滄洲鴈春風采石鶯好山環故里流水背孤城去住無拘繫閒身到處輕夜坐彭贊禮竹塢二首獨坐依修竹秋聲近户多疎鍾清紫禁凉露濕銀河野飯思薇蕨儒衣想芟荷小山招隠意藂桂有遺歌静夜凉風動林疎宿鳥驚玉繩低萬户銀漢轉三更露重絺衣薄香浮茗碗清班姬紈扇曲此際最闗情送沈太守之雲南滇陽南望逈五馬引雙旌鳥道雲邊斷猿聲月下清黔江通逺海僰樹擁孤城已是諸侯貴毋論萬里行送謝明府之桃源楚地佳山水桃源境更幽汀蘭行處採湘水抱村流門掩山城暮蟬鳴驛樹秋昔人遺洞在騎馬一來遊紅葉染樹初凝茜連林漸積丹露藂消黛色霜片妬朱顔菊避重陽艶花羞二月殷娥眉争拾取題字寄人間送周編修姪還文江落景照離筵華音促别絃老親長日念遊子幾時還玉雪中郎貴青春小阮賢重來拾瑶草遲爾五雲邊送王僉事之湖廣江漢維南紀星辰近太㣲地分方嶽重官到憲臺稀逺水連秋濶輕帆徹夜飛人生驄馬貴好是繡爲衣寄劉三髦五首劉子窮經處柴門野水濱俗人那可到往哲自相親道在寧論命家空不歎貧幽棲如可遂遲子結南隣吾愛劉公子渾如漢士風古心真自得髙操更誰同緑水溪邊舫朱絃膝上桐我慚簪組累不得逺相從濯足清潭裏移家碧澗邊非闗傲軒冕自是愛林泉野鶴閒同往溪雲静與還東山謝安石何日起髙眠才俊青雲早嗟君獨出遲寧甘身未達不與世相知霜月隣僧磬凉風野客棋懐人在天末無地寫幽思剡書多日下猶卧碧山隈只歎相如病空淹賈誼才窓虛雲自宿門掩鶴初囘好在禾川上應愁驛騎催題世德樓髙樓無四隣䦨檻逼秋旻創造懐先代登臨屬後人水雲供逺眺山月共清貧羡爾丘中士雲霄寄此身送王知州赴禄勸行盡天涯路黔南尚幾州孤城藏萬壑殘月在扁舟劍閣雲邊斷巴江樹杪流兩囘經鳥道應記舊曽遊送梁僉事還蜀二首臘盡催行色天涯起别愁暮雲遮雨濕寒水帶氷流鳥道青驄馬烏臺紫豸裘漢廷諸俊彦風裁范滂優行人冒曉霜白簡繡衣裳復任辭三殿觀風動一方秋林黄葉暗春水碧芹香杜子留遺跡煩君訪草堂送劉教諭還沛縣相望渾未逺相㑹竟難常交態貧如故離情醉蹔忘淮流通海近豐樹入雲長羡爾官非賤横經漢祖鄉送人還永豐二首迢遞京華道蕭條嵗晏時江風寒釀雪淮水夜流澌逺浦帆來小殘鍾烏去遲瀧岡天下重歐子有穹碑臘盡促歸橈離魂黯欲消故園頻在望知己邈難招燈火江村市梅花野岸橋行邊憐寂寞况值雨蕭蕭送鄧宗經還永新訓導二首相逢疑是夢乍見總堪憐良㑹來天上長貧在客邊青雲違故舊華髪感流年明發征帆去依然各一天十載留京國三年别故人賈生猶未達鄭老尚居貧燈火黌宫夕菰蒲野水春誰知他域别凄斷更傷神寄蕭教諭三首見説崑山縣孤城在水鄉汐潮通海近雲樹接吳長夏暑圩田􅌻秋隂學舍凉年年春色裏桃杏爛宫墻縣齋蒲葦裏鷗鷺與相親衆水春環舍孤峰晚對人海鮮便乆客儒服稱閒身肯念同袍者緘書莫厭頻身名俱未達朋舊故應疎多病惟髙枕何人慰索居縱鱗思曠野疲馬倦長途誰似儒官好優游翰與觚耕樂亭二首孤亭臨夐野空濶四無隣車馬來遊少農夫就餉頻晴簷鳩喚雨社甕鳥啼春竊禄真何補投簪媿野人苔痕臨水潤樹葉近秋稀細雨羣農集殘陽一鳥歸村童收滯穗野老候空扉亦有躬耕意青莎擬製衣送人還永豐三首君家簪紱裔羣從玉連枝遊子龍頭貴中郎燕頷姿雙尊論乆别千里慰遐思六一遺風在懐哉百世師行李歸期促山川去路遥疾風狂入夜淫雨晦連朝㠶逐孤飛鳥江通逆上潮慿將棲遁意鄉國寄漁樵候館促離杯愁顔且强開砌蛩驚露泣巢燕避秋囘菊徑深黄葉衡門掩緑苔緬懷西漢士據地獨竒才郊祀齋宿彭太常永年公署二首寂厯容臺署髙吟逸興生泉香春井溢鐘斷夜堂扄清漏隨風度流雲傍月行蹔來猶愛此住久轉忘情竹静風停後瓶香茗熟時燈寒人未寢露冷鶴偏知頗愛良宵静飜嫌白日遲年年此齋宿載誦我將詩太廟孟秋時享同陸員外齋宿槐露滴新秋齋房夜色幽罷琴期月上捲幔見星流池冷菰蒲静窓寒竹樹稠清宵容易盡香茗且淹留喜張進士叔豫見宿旅舍窮巷寂無隣青燈共故人逺聲霜下磬孤影客邊身露冷蛩相弔庭寒月自親殷勤一瓢酒更與話酸辛碧峰寺慎公房碧嶂屏風秀清流束帶圓烟霞醒醉夢鐘梵寤僧禪亂葉當人落孤雲引鶴還聲聞如可契應此息塵縁謝賜西洋布異縷何纎細輕盈玉雪紑鮫宫初織罷海國逺輸來捧拜榮恩賜紉縫稱體裁㣲軀増照耀被服媿非才竹所二首何地偏多竹翛翛庭院幽夜凉難得月雨過易成秋不厭貧家看那妨好客留緑隂多處坐疑泛渭川舟王子幽棲地蕭森修竹林好風催布席疎雨罷鳴琴天籟醒塵夢凉隂伴醉吟幾竿渾不俗賴爾悦閒心送曹判官蘇州治水二首别駕之官日都城欲夏過一篷畿甸雨雙槳石湖波郭外青山少城邊白水多三吳民墊久拯援術如何聞道姑蘇郡東南近海潮圩田多夏潦塲圃减秋苖平易遵前訓煩苛革舊條更應持㓗慎玉帛此鄉饒詠蝶栩栩戲晴光留連媚露香舞隨花片白棲共柳絲黄樹杪鶯捎急簾間扇樸忙南園芳草地撩亂逐蜂狂寓舍梅一株翳榛莾中詩以唁之篠蔓翳頺垣娟然玉雪痕寒香偏晩節春色自名園鳥啄梢頭蕋苔沿砌下根猶能異桃李不在狄公門席上贈妓綰霧纎纎指凌波小小蓮春山銀燭下秋水玉尊前舞袖鴛鴦錦歌珠玳瑁筵座間俱狎客惟屬杜樊川送陳生歸吉水赤岸二首清砧兼落葉總是别離情去路千程逺歸舟一葉輕秋雲連樹暗寒日映川明亦有滄浪興何時共濯纓歸心無日夜孤舫不停牽沙蠏寒縁草江豚暝觸船銀河通赤岸翠壁瀉紅泉莫戀幽居好功名貴壯年送周秀才遊長沙迢遞長沙道蕭條晏嵗遊亂山黄葉寺孤棹白蘋洲夕鳥衝船過寒波背郭流毋論卑濕地賈傅昔曽留送周布政還河南出鎮名藩重來朝異眷隆殘年將欲盡知已忽相逢泥淖梁園雨埃塵艮嶽風旬宣如有暇煩弔宋遺宫靈谷寺一徑入青松樓臺峙化宫雨深山果落雲去石床空樹老多巢鶴潭清或見龍上方禪寂地蹔得寄塵蹤南溪書屋松竹連村暗軒窓面水清蘚痕留屐齒灘響雜書聲行藥因過寺輸租蹔到城静觀簪紱累還喜布衣輕周原幽居山色蛾眉秀江流燕尾分亂蟬吟落葉獨鶴引歸雲黄葉溪邊樹青帘雨外村興來留客坐隨意倒芳樽送戴教授北行别路三春雨行舟五两風花香隨路減柳色上衣濃共是青雲客先成白髪翁離情如逝水萬折亦朝東送張廵檢之雲南弓劍廵荒徼衣冠别上林路經三峽險人到百蠻深枸醬諳夷俗兒童解僰音㸃蒼山色古道便一登臨送人之京上已風光好新晴物色妍青山林下屋緑水鏡中船節換榆烟火花殘穀雨天壯遊逢勝景况覲五雲邊送陳郎中重使西域十首九重辭鳯闕千騎度龍荒寳劍懸秋水珠袍照雪霜泉源隨地少沙磧亘天長人羡皇華使誰知粉署郎天使下邊州青絲控紫騮風雲隨節斾雨露到氊裘斜日羌城晩㣲風塞草秋壯心知未已萬里快重遊逐水安營晩鳴笳渡磧遲穹廬無舊館行巻有新詩駿骨天生馬竒毛地産獅蕃酋迎候處一曲漢歌詞疊鼔雜鳴笳天風送使槎内臣金鏤帶壯士鐵爲檛去路縁青海行營駐白沙單于爭慕義不用李輕車驪馬紫金環行行出玉闗懸河三寸舌積雪萬重山旗影連雲巻弓弦向月彎封侯儒者事天子待君還大漠連川逺行人去國遥烏孫遺種在狼望舊名消夜雪戎王帳秋風使者軺懸知専對好談笑欵天驕寳帶懸魚服雕弧掛馬韀皇恩覃萬國兵氣静三邊瀚海寒生月崖城暮鎻烟欲窮西域事班史有遺編地勢三城逺河源二水分火山稀好雨鹽澤足寒雲鵰没平沙外駝鳴古澗濆慿髙時引睇何處是中原出塞春乘傳投鞭晩下營旋風邊馬疾掣電皂鵰輕浩蕩窮源志迢遥奉使程支機如得石持往問君平行盡伊吾道遥天氣候殊神僧留白骨毒草隠𤣥蛛近水多行帳窮荒絶逺書竚看歸覲日玉勒控宛駒送李生還安城北薊辭嚴父南京别故人一身勤逺道千里念慈親柳暗江城曉萍香野岸春燈花先報喜應更倚門頻南京送髙教授赴選卿家本同郡客路又離羣夜柝敲寒月霜鐘度暝雲征袍迷草色古嶼帶潮痕寥落分携處秋鴻不可聞共是浮萍跡偏憐髩易新江湖留滯久朋舊别離頻試數中朝士應多故里親莫嫌氊獨冷年紀政青春鷺渚輕鷗芳洲白鷺名無數白鷗輕暖戲桃花水晴依柳絮萍飛來兼早鴈散去避秋鷹何處忘機客時於此濯纓寄劉孟熈隠者嵓壑幽棲者閒情老不衰露葵縁客折晩稻約僧炊苔徑林風掃松窓嶺月窺詩名兼逸興湖海萬人推次衡州征棹艤衡陽孤城堞雉荒流雲時翳日㣲雨暝生凉江濶鷗波逺天空鴈字長採蘋無限興烟水晩蒼茫已亥房山除夕營中作殘臘中宵盡孤懐百感深已慚先哲訓徒抱古人心偃息何由得勤勞敢不任寒燈照空榻擁褐謾愁吟患難仍連嵗蹉跎獨此身風塵雙短髩宇宙一窮人向曙繁星没凝寒積雪新椒花今夕酒誰壽白頭親稚子捐深愛酸辛痛莫支坐愁侵骨髓行樂負心期風俗殊方異人情近老悲前程駑馬足敢不慎驅馳風雪當除夕空營一榻孤天涯悲䑛犢地下憶童烏寧復衰顔壯惟應淚眼枯大靈如不妄再拜謝𤣥夫今夕猶常夕如何倍憶家二三千里道四十五年華貧有文章在官無品秩加遥知妻共女愁坐卜燈花警柝嚴廵邏寒更獨坐聽凄其孤影瘦邪許萬聲停敗壁風穿葦空庖凌在缾茫茫天壤内么麽一螟蛉五峰菴住上人房住公棲遯處重到只空臺竹榻無僧掃松闗有客來夕陽寒鳥集凉露候䖝哀祗苑猶如此何方免刼灰雨中桃花霡霂過芳園枝枝積涙痕色憐開處淡香愛墜時聞採倦蜂鬚濕銜多鳥咮芬東風解人意吹片到衡門蕭芳桂挽詩四首芳桂殞清秋無人不淚流通才今日少遺恨幾時休苔蘚碑三尺楸梧土一坵鴈門前學士地下與嬉游卜宅瀘江曲逢迎意最真竹軒觀奕倦花嶼放舟頻莫究平生志先捐未老身最憐黄壤魄長夢緑窓人豪傑空餘子尊賢眼倍青揮金資客醉闢館教兒經天道幽難測親情痛不勝山陽懐舊笛幾度斷腸聽有志惜無年香名逺近傳客情千斛酒嵗計幾莊田吐論常傾坐收書不吝錢善祥鍾令子酷似乃翁賢庚戌三月三日服闋之京舟次吉水漸老怯離鄉那堪道路長病身愁北去倦翮戀南翔旅夢縁鐘斷憂懐藉酒忘低回愧江叟白首釣魚航過清江浦逈路迢迢汀花帶雨飄殘燈江上廟新水屋邊橋鷺宿争投石鷗驚或避橈無因謝軒冕老作白雲樵次洪都春波拍岸平雙槳一舟輕燕麥偏傷雨鶯花已負晴荒亭徐孺宅遺堞灌嬰城北去南來客都縁利與名彭澤縣石崖僧房窓户俯澄潭龍宫似可探藤蘿棲鶻樹缻錫定僧岩斜日疎疎磬長風去去帆只應輸野衲長此卧烟嵐早發小孤山遇風湖盡江逾濶舟行路若迷垂楊春寂寂芳草雨凄凄漩水黿鼉窟平沙鴈鶩堤風波隨地有何處可幽棲舟過南京鍾阜白雲邊橋陵鎻暮烟聖謨真逺矣王氣故依然玉帛諸番㑹金湯萬世傳誰陳根本計有力可回天尉氏縣縣舍隣溱洧門當緑野開禽巢堦下樹蝸篆壁間苔俗質稀絃誦田荒剰草萊宋金酣戰處武穆獨竒才宿興國寺人静鐘初斷肩輿到寺門風簷寒犬吠露井候蟲喧弱蔓低垂樹枯蓬宻覆垣蒲團分半席蹔憇給孤園宿端壁寺遺構象王宫荒凉小邑東一燈秋殿閉孤榻夜窓空飢嚙床頭䑕愁吟砌下蛩蕭蕭黄葉墜庭樹顫西風長葛道中郊原殊蒼莽禾黍未全收桑柘千村晩枌榆四野秋空林投倦鳥枯草齕疲牛淡靄輕烟外㣲茫見許州次襄城晨鐸語西風衣單怯露濃豆苖遮地黑柿實照園紅曉色蒼茫裏秋光惨淡中永懐東漢士風裁李膺雄晩至葉縣擾擾道途間埃塵两髩斑清風牛背笛斜日馬頭山荷葢擎殘緑榴房破嫩殷蘋花秋水岸空羡白鷗閒王喬觀王子飛鳬處仙遥跡尚存城荒生暮靄殿古鎻秋雲壊壁燈烟暗閒堦草氣薫古今爲縣者神異獨稱君留魯山縣黎庶凋殘甚惟餘樸儉風名因元子重地本魯王封撫䘏無賢令流移有惰農誰將于蔿曲歌向五雲中宿廢普濟寺青山行欲盡深樹見僧房雲氣千峰暝秋聲一院凉長藤懸破衲脱葉覆空廊龍象黄金地蕭蕭蔓草長山中曉發雲氣曉㝠濛人行萬木中菊乾偏喜雨柳弱自愁風緑髩流年改丹心往日同明時叨重寄無補愧諸公懐黄州滕太守昔在南宫日仙郎總俊髦分符榮出牧載筆憶聨曹身已朱旛貴名猶粉署髙公餘頻弔古艤棹訪臨臯逢索員外話舊相見仍青盻相悲總白顛功名憐蹭蹬患難喜生全小市三楹屋荒村數畆田南交同宦者若箇在林泉内鄉縣巖邑千山裏荒村户半逃曉飡炊橡栗寒火爇蓬蒿深秀非盤谷凋零類石壕自傷無善政撫問敢辭勞新野即景村暗濛濛雨清流淺淺溪菊花長帶濕豆莢半沾泥野逈居民少林昏去路迷自投新野界蒿草與人齊雨中赴唐縣冒雨趍唐縣蓬蒿已厭看長途泥滑滑平地水漫漫枵腹流民餒單衣稚子寒撫廵兼勞徠衰病敢求安宿泌陽縣田舍民家深樹裏下馬㸃燈時風雨闗門早衣裳拜客遲艱難逢歉嵗逼廹後租期説到傷心處澘然淚滿頥過光州望馬中丞墓元運方全盛公文擅大家謹嚴真有法悃愊信無華故里祠堂廢荒阡墓碣斜欲羞蘋藻薦不敢駐行車懐元進士龔友孚世運滄桑改公名汗簡留六軍憐駭散四海竟横流徒屈英雄策空遺社稷憂浮光垂白叟仍解説才猷晩赴西平晩渉西平境荒郊望欲迷暝烟村逺近寒樹塜髙低驛路通淮甸僧房隔汝溪栢亭何處是極目草萋萋王侍讀汝嘉挽詩識面嗟誠晩論交覺獨深麟經三世業蠧簡一生心諸老憐將盡孤懐痛不禁遺絃空自絶無處覔知音閥閱衣冠盛才名伯仲齊宫袍裁賜錦御酒拆封泥屢握脩書筆頻分應制題只今文燄在猶自燭雲霓少日邊庭戍曽馳草檄名談兵諸將屈較藝衆人驚已並青城譽仍兼玉署榮九京那可作惻愴起深情玉堂陪末議荏苒七年餘夜漏秋同聽春潮曉共趍仲淹空有策和靖却無書垂老交游盡臨風淚滿裾宿舞陽開元寺驅車廵郡邑夜夜宿僧房窓掩芭焦雨鐘敲薜荔霜一燈千慮集孤枕五更長無補惟宜退先塋有草堂歸自南陽去日猶秋暑歸時已冷霜江山非故里人物是他鄉老態隨年出離愁共路長埃塵如見戀到處撲衣裳經息縣嵗晏經新息晨征念路遥輕氷方盡合殘雪未全消行客歸心切居民餒腹枵停車徒自感只合返漁樵除日早飯田家田家無節序除日亦尋常破釡初炊黍空槽旋壓漿甕寒虀結凌窓濕紙粘霜逺役如堪免長貧不敢傷除夕宿汝寧僧舍聞停止夫役喜而有作除夕留僧寺焚香對老禪青燈伴今夜黄厯換明年宵旰憂誠切瘡痍痛暫蠲明晨呼萬嵗頓首玉堦前過殽陵闗春盡殽陵道千山萬木中水聲泉聒聒雲氣雨濛濛嫩草溪邊石幽禽樹杪風抱闗黄髪吏寧解識終童永思堂三首一自雙親逝孤懐每自傷恍疑聞謦欬猶似見羮墻厚禄嗟何及遺言敢暫忘番湖東去水不似此情長人子思親意悠悠鎮不窮常時瞻畫像每日想音容幽顯雖云異精誠或可通哀悰真罔極長繫寸心中憶昔承歡日沉思痛倍饒夢魂勞夜夜淚眼濕朝朝兒髩霜頻積親塋樹幾凋山夷河可塞此恨未應銷賦得驄馬送别驄馬玉爲蹄行行過柳堤雲隨金絡轡花映錦障泥流電雙瞳炯揺風一尾齊似知離别意欲去更頻嘶題陳道士處静軒素性便孤寂無營晝掩闗卧聞清露墜坐見白雲還鶴夢棋敲醒蝸墻蘚蝕殘仙瓢休掛樹風起厭喧煩結宇汴城闉開門見市人輪蹄連旦暮烟火雜軍民向閙尋閒處隨縁寄幻身凡心如未泯林壑亦埃塵虛室原生白寥寥一榻清石壇雲影度金掌露光凝叩齒宫神集齋心道氣澄三尸能斬却鉛汞自然成軒車從擾擾窓户自幽幽藥徑人蹤絶苔堦鶴跡留平生雙短屐浮世一虛舟即此堪棲隠何須物外遊春草二首苒苒復萋萋征袍映欲迷暖烟秦苑北寒食杜陵西緑嫩羞鸚羽青柔襯馬蹄南園新雨過畦菜曉争齊秀色逺相連柔香雨霽天嫩兼蒲葉細濃奪柳條鮮莫把征輪碾留教醉客眠王孫行未返芳意自年年晩登汴城休騎上荒城斜陽萬感并嵗憐頻有旱雷恠久無聲芳樹鳩巢廢香泥燕壘成緬懐前宋士人艶道鄉名郭外野寺野寺逺人烟觚稜殿兀然瓦罏雙足折土偶半身全鳥去堦留篆蝸藏壁帶涎閻浮俱苦海何處可安禪立春日作殘厯惟餘晦殊鄉又遇春壯懐灰共冷衰髩雪争新頗覺逢迎懶徒思引退頻自縁忘物我何用辨玒珉聞舍弟昌復訃聞訃心先折開緘淚若傾異鄉離别恨同氣死生情哽咽悲何已呻吟痛曷平九京知有憾弱子尚孩嬰曽共過庭前雙親獨爾憐亢宗徒齎志閲世竟慳年忍割今生愛難期再世縁永懐諸弟妺三已在重泉五十年相聚俄驚一夢餘酸辛身後事愁苦病中書苔蘚沙塲骨羅紈肉食軀何如終牖下隨分塟郊墟未病猶躭飲方强遽解紳短脩元有定聚散本非真蘚碣標荒壟桐棺掩幻身達人曽祼塟那用更傷神春祭陪祀東書堂賜茶退歸作香篆半成灰齋宫賜坐回苑花紅未拆堦草緑先催棋布星羅局茶傾雪泛杯非才叨岳牧明祀幾畨陪偶然作謬忝藩維寄空慚老病身髩髭愁裏雪花柳客邊春直道乖流俗餘生任化鈞時無鄒孟氏枉直向誰詢三月四日即景忽忽春將暮俄過三月三草誰憐益母花自媚宜男乍到尋巢燕初眠上箔蚕新茶與新筍鄉味憶江南合歡牡丹三首應教作爛熳絢晴朝容華若賽嬌瓣多愁露浥幹弱怯風揺共訝晨粧淡都縁宿酒消更期千嵗壽嵗嵗賞妖嬈花艶奪霞紅葩分嫵媚同鬬妍雲錦幄競秀綺羅藂淑質俱傾國凡英盡歛容内庭和氣盛卉草最先鍾曉露濕芳英駢開耻獨榮仙姿雙弄玉道韻两飛瓊人羡長偎倚天令巧合并鵲巢風化美佳植固堪徴合歡芍藥二首奉教作名品擅維揚嫣然共頡頏總專傾國艶難辨是誰香窈窕千般態娉婷一種粧螽斯端有兆宜爾預呈祥樓子花王副根同蔕亦連固知皆雅淡孰敢别蚩妍繡閣雲鬟並粧臺月貎聨暖風香霧裏向背總堪憐題小景四首南北两峰前逢春物物妍露桃臨水岸烟柳隔江船古廟尋嘉澤幽亭訪冷泉遊人都載酒來往六橋邊芳樹垂巖暗藂篁傍石低虹流雙澗逺笏卓數峰齊棋許髙人對琴教小豎携湖山皆秀麗無處不堪題窈窕洞無門寥寥隔世氛板橋穿竹篠苔壁綴松根孤嶂摩雲秀飛泉觸石喧不知何道士收露㸃𤣥文積素晃溪山人家盡掩闗客舟寒尚挽漁槳暝初還老樹髙低岸殘蘆曲折灣欲投峰頂寺氷滑路難攀和友人韻山暗雲霾樹潮生水到門野航乗一葦村釀醉孤尊夜火燃松節晨餐煑芋根自諳棲遯志富貴不須論荷衣蘭作佩葯檻席爲門淡泊幽情逺真淳古道尊花飄仁在核葉落液歸根消息盈虛理當從達者論地險過牛渚林幽類鹿門戀兹耕釣樂忘却縉紳尊掃石安茶竈携書坐竹根衰榮相倚伏天道妙難論寄南昌沈大尹杖屨歸田日山林養病時缻無陶令粟笈有杜陵詩蒲柳身空老松筠性不移何由重㑹面相與話襟期終日惟枯坐衡門掩薜蘿自縁知已少謾道識人多往事心徒赤浮生髩已皤久思飡杞菊作賦續東坡昔出别鄉親今還少四隣天留雙眼在人笑一身貧勇退慚先哲相知感故人平生堅白意未肯湼緇塵題終慕堂舊隠金鰲下榕蕉間橘林他鄉頻引睇先壟鎮縈心世澤溪流逺哀情海水深楹間懸鉅榜一顧一沾襟自憐成永感那得再晨昏掛壁遺容在紉衣宻綫存秋霜心易愴春雨恨難論一脉書香逺相傳子又孫燎黄褒典重純素此生孤長抱窮天痛仍懐永世圖禄豐親不逮泣盡眼將枯子職知能勉移忠仰聖謨運甓漫稿巻三
