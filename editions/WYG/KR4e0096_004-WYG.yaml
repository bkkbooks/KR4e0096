body:
  text: 運甓漫稿巻四明李昌祺著五言排律送張㕘政考績之京瑣闥才名著藩垣位望隆三年㕘省政千里獻民庸寮寀勤勞共兵氓愛慕同柳亭張餞席桃浪送征篷天上乘槎客江邊卧轍翁櫓聲揺落月帆勢快長風浩蕩淮流壯嶙峋岱嶽雄金臺紅日下貝闕綵雲中清慎聞羣辟廉能徹九重陛陳嘉績最階授散官崇復職紆新眷辭朝返舊封桓桓方叔烈戀戀子牟忠甦息憐諸郡旬宣仗數公追呼鞭朴少飽暖嵗時豐去路應逢夏回程莫待冬詩欣千首富錢笑一文空但覺烟霄逈惟知雨露濃棠隂城下路歌詠走兒童幽居華亭當巽位匪北與東南新月􅊏懸夕斜陽暝翳嵐秋聲連地起雲影半空曇紅葉凋園柿青林秀石楠到門無吏跡雜坐有農談茗椀惟孤啜橙杯不獨銜芙蓉霜肅肅楊柳露毿毿晴雪鷗棲渚腥風虎卧岩耕夫朝就餉過客暮停驂孤夐天疑近清高境不凡谷深寒鎖翠溪濶暖浮藍養靜閑情愜居安逸興耽康强身懶杖蕭散髮慵簮暑退嫌藤簟涼生怯葛衫好書常在案雄劍鎮藏函榮任他人取幽宜我輩探溪山聊寄傲簡牘貴研覃名教真堪樂禪機弗用㕘虚心千箇竹直節數株杉永夜長庚對煌芒不可緘挽族兄布被當年友嗟君更可憐父兄嘉篤志朋輩羨英年早負穿楊譽終酬折桂縁學成寧落後榜揭果居先未對劉蕡策旋揮祖逖鞭裾從彤邸曳書向石渠編仕路方榮進蠻邦遽斥遷瘴生雲滃墨颶起浪掀船地僻夷風陋天遥氣候偏毒淫那易辟性命竟難全忍死留遺語含寃入下泉行囊題詠在謫籍姓名蠲弱子擕家返輕函載骨還九京雖莫作百韻或堪傳勿訝淪殊域猶能返故阡試觀同譴者亦有𦵏烏鳶挽友人舊説盤中隠今為物外仙識韓空有夢交藺竟無縁未論宗支異還叨閥閲聨學精多士許孝篤衆人憐恬退忘軒冕沉潛嗜簡編衣冠推典則詞賦擅清妍世厯滄桑改家臻福慶全遺榮身自在占勝地幽偏久悟浮生幻俄隨大化遷歛裳真逝矣易簀靜蕭然漫詫騎鯨去那因化鶴還菊軒棋已罷竹館榻仍懸簾捲風翻帙忩虗雨慢絃遊山雙屐在釣瀬一竿捐雅操超今士高標慕昔賢新祠應得侑遺稿或堪傳五桂凌霜秀藂蘭浥露鮮年年寒食節釃酒拜荒阡壽某翁聖代功勛著天倫樂事專位躋三品峻義篤一門全致養惟殫禄通財不計錢永懐烏鳥哺仍感鶺鴒篇萱草幽藂秀棠花舊蒂連氷盤魚味美綵服鴈行聨祥柰寧煩守肱衾且用眠老親欣未耄難弟愛彌堅茵褥重重榻塤篪秩秩筵夀觴更跪勸獵騎並驅還橘墮猶懐陸荆分謾笑田侯封應有待輿論諒無偏遐算慈闈健同心貴介賢雄文書盛美燕許筆如椽題山水圖别業在圓塘無鄰傍草堂瀰漫新水濶逺近好山蒼樹宻松依檜林幽柘混桑頗同嚴子瀬仍似杜陵荘橋峻妨遊屐溪迴隠釣航鳥聲春晝永花氣午風涼把巻潛心玩逢疑著意詳詎容便水石未可薄軒裳愧我身空老憐生力致强閑情雖足適壯志㑹須償尊府當朝貴佳兒嗣世良奪魁期接武澗壑有輝光運甓漫稿巻四
