body:
  text: 運甓漫稿巻一明李昌祺撰五言古體擬影贈形太極生萬彚繄人最為靈云胡浪自苦馳騖跡靡寧化機有恒運疾急弗暫停適見方紅顔髩髮忽已星人身非金石終當歸沉冥不如學神仙服食煉爾形君我兩無壞永共天地齡願君取吾語日進參與苓形答影有形斯有影物理固其常我行爾必偕我息爾乃藏豈但相依附實此同存亡學仙非無術却老亦有方古稱彭聃輩其壽邈難量於今竟安在孰是長生鄉多君為余勸兹道終杳茫參苓且當止莫若啣杯觴神釋人生斯世間於物亦豈殊二儀妙參贊政由我中居與子雖三名其實本一軀出處既弗異如何乖所趨老氏貴不死長生出貪愚神仙果何物天地尚或渝飲酒固所好悲愁賴其驅從古戒沈湎先王有遺書學仙非吾事痛飲豈我圖但當委大運俟命寧憂虞既來諒必去此理端不誣逍遥以乘化荷鍤徒區區甲戌九日陪瀧岡先生暨諸友登髙旌陽宫分韻得影字蛩鳴霜清候葉飛秋盡景萸菊方交秀琴册亦蹔屏逡巡出芹泮次第陟松嶺涉隘齒或亂升曠序還整登降屢斷續賡酬互馳騁檉林逓陰森蘚逕極修永席地藉山雲臨流潄石井欲投岩棲人拂衣世外境寄情園兼綺洗心箕與潁縫掖既身被逸致只神領偶此諧一醉已見夕月影淵明酌酒圖耕耨有餘暇蔭此榆柳陰燕坐對佳菊解襟獨長吟老農得羙酒負榼逺見尋呼兒滌塵爵相與聊共斟終觴兀然醉富貴非所欽吾生詎能㡬為樂當自今洞章一首送彭道士赤明肇無始玉京聳神霄真人遏死路五老御靈颷𤣥梵超溟涬豁落開幽寥中有浩刦尊絳節諸天朝丹光耀明景春華凌翠條欲結無窮遊飛神躡璇杓稽首拜太上髙舉同逍遥題松菊堂巻乆矣厭流俗稍與世背馳癖性愛松菊並植當軒墀幽居無他玩雅好良在兹清風忽然至天籟鳴參差凉露曉厭浥衆蕋含華滋顧渠歲寒物自與靜者宜不形丁生夢聊詠陶翁詩養拙茅簷下過此非所期松石間意軒夙有山水癖已忘天路遊屏跡衡門下愛此松石幽青松蔭我屋白石臨溪流逍遥曳藜杖撫玩舒煩憂老農解吾意負榼逺見投忻然笑相命且共飲數甌倦即憇石坐時還撫松謳盡此一日樂明日非吾謀醉眠松下石孰謂此生浮送友人故鄉訪族秋雨浹旬月積潦連平津慨然理舟楫訪我族中人相去實緬邈悠悠隔冬春同源既分流萬世本一身駕言逺相唁詎敢辭艱勤丘壟得灑掃尊酌且復親雖未獲乆處蹔來亦所欣感此遲莫年再至恐無因各願愛體素令徳期日新題晩香堂二首弱志弗茍尚遂與世好殊性本愛閑逸種菊繞蓬廬時當雪霜厲羣卉悴無餘斯花獨敷榮為我莫景娯掇英泛美酒燕坐當前除菊可制頽齡酒能解饑劬陶然有真樂此外奚所需俯仰天地間百年復何如寄語達生者浮名豈能拘靡靡秋日晏凄凄霜露零紛紛衆卉悴粲粲佳菊榮我實幽居士適此隱遁情園林無來躅牕户有餘清床前一壺酒滿泛黃金英長歌散襟顔歌竟時自傾頽然既就醉此樂將不勝微願良易足多技豈吾營余生後彭澤千載仰德馨送何教授奉母還臨川且省其父秋日凄以白遊子念歸還奉母載官舫駕言還臨川王門豈不樂所惜慈侍偏况兹嚴親在家居垂莫年温涼謹問候子職媿乆諐今我幸具慶而可各一天故山有髙堂二老心所便豈無一觴酒跪勸當几前敢謂美晝繡庶用怡華顛依依戀膝下眷眷懷日邊重來勉盡瘁移孝乃為賢乘化室素髮被秋髩筋力與昔殊人身非金石歲月苦易徂麟原有青山眞宅預可圖穿雲斵隧穴宻甃圓且虚石獸既外列瓦棺亦中儲前立兩翁仲傍蹲一龜趺地靈暨木伯呵護衞以驅四序自更迭大運誠須㬰千秋百歲後瞑目歸斯廬油然委蜕去此外復何虞題愛日堂逝景如奔流晝夜東向馳歳月諒難盡人生信有涯所以孝子心惄焉抱深悲舉頭視慈顔已覺非昔時適見雙髩𤣥于今成素絲念之益増感何由報恩私晨興啟髙堂甘㫖具在兹奉觴祝親壽願共春暉遲以斯菽水歡為彼衰莫怡去日莫能挽遐筭或可期庶㡬崦嵫照不異扶桑曦題山水小景野外少人躅值此佳日遲偶與二三友遊觀賦新詩青松藹繁蔭碧草含華滋逍遥恣言笑童稚亦娯嬉濟濟炫春服悠悠詠清沂兹歡恐難再興盡以為期題湖山佳趣巻宦遊愜深好乃在名勝區山水自足適况兹職文儒横經有餘閑逍遥出通衢春服各已成遂與童冠俱徘徊恣言笑登陟忘饑劬晴鳶戾層空弱藻翻文魚至理與景會天機獨吾娛悠悠仰川上眷眷懷舞雩詠歌返黌舍髙興誰能諭梁處士挽詩一首涼颷振庭樹殞星當前除伊人此遐逝歛衽歸𤣥廬翩翩丹旐揚祖行在須㬰衣冠閟重泉體魄寄荒墟浮生雖有盡令德諒不渝沒世茍無述百年復何如梁鴻凛遺烈千載與之俱容膝軒一室厪如斗堆床置琴書耕讀得閑暇危坐心自娛天光在甕牖席門掛繩樞已忘朝市榮聊依野人居環堵本隘陋於我信有餘陶然俯仰間八荒在庭除豈但一榻外六合真吾廬即此自寛裕廣厦空渠渠春日與髙逸人行秦淮河上作端居苦無悰今旦得良契逍遥出近郭散筞淮水際草軟倦堪眠林香醉宜憩鳥哢晴始和川容晩逾媚篠深風葦宻沙没夕潮至野鷺渾忘機似識靜者意幽懷頗得愜逝景苦難繫候卒晡欲還春城暝將閉因知市朝隱兼有林壑致永言終此生涵泳太平世金谿鄧處士挽詩永夕少微墜伊人亦長捐蕭條薤露歌祖行出荒阡遺骸寄空木逝魄歸窮泉有生諒必死自古莫不然矧兹得髙壽况乃歸其全瞑目可無憾茍生真足憐鄙哉學仙子服食希遐年具慶堂髙門多積慶父母喜俱完兄弟亦無故妻子復團欒况兹值明時懷紱為縣官民淳衆務簡日夕閑且安命婦出中房具彼飡與盤怡然一室内骨肉恒相看至養在承順菽水有餘歡簡書諒足畏憂患何能干徐道士安處軒塵氛既屏絶氣宇亦澄鮮心恬境逾寂慮遣情自捐結宇依層岩開軒俯重淵遥林含宿雨古樹帶秋烟落花晩成積歸鳥夕知還習靜泯衆累守黙息萬緣清虚固其性聲利豈所便智黜道乃得朴返真斯全將隨鳯鸞侣以引龜鶴年淵明圖閒居寡人事逍遥歩里中風霜凋衆卉獨榮見孤松南山忽在眼佳菊亦成叢欣然縱遊眺况兹年歲豐幸有盈瓶酒酬勸偕老農醉來多竒趣豈必絲與桐冶城懷古趍朝退北闕弔古來西州忠貞結纓處松栢餘荒丘蕭條伯氣歇慘澹寒雲浮嗟哉晉多士孰奮匡君謀壼也眞丈夫毅然無匹儔父子著偉烈奸諛讋芳猷英姿儼遺祠信史芬餘休疎鐘冶城晩落木秦淮秋我來事蒐訪往迹猶可求如何忠孝名不在曠達流誠知清談髙寧執鄙吝優同朝江左賢顙泚徒懷羞徘徊凝望乆日落長烟收題亡羊圖澹無組紱累夙志愛林泉挾册驅羝羣箕踞叢篠邊玩繹造芒芴超遥謝蹄筌㣲風延衆籟落日明長川心景適相契物我遽兩捐爾羊本非闕我書亦空詮不寫穀生博畫師無乃偏執業雖各途亡羊奚異旃固知東陵愚豈及西山賢徇名與徇利均死何後先棄置且勿較呼兒進杯棬哀蕭教授引之銜哀讀銘誄悲淚若河懸念我同門友于今在九泉契濶雖云逺情好乃逾堅都門送别時何意遽長捐達宦每在晚朝露竟溘先一夕成長往二𦙍仍各天枯骼委烈熖餘燼藏墓田人生孰無死禮葬固所賢等為歸腐朽終當隨化遷所以曠達士形骸豈復憐佳名苟不没詎必分烏鳶題王司直所藏米南宫畫幽壑霽殘雨飛雲晝濛濛大江瀉練遥上與銀漢通村墟極平壙島嶼迷西東長林隱空舍衆籟吟天風懸崖忽焉斷浩蕩烟濤雄夕嵐落霞外把釣何老翁流水共情性沙鳥知心胸浩然滄浪歌濯足清潭中始知簪紱華不與漁樵同興適隨去留身閒忘達窮我生夲放浪中年抗塵容觀圖思初服脱屣期息躬長揖鳳鸞侣永投鷗鷺蹤自此卸銜勒郊原春草豐題十八學士圖慨觀瀛洲畫經濟懷羣公唐宫委蔓草寂寞昭陵空天策舊多士猶餘圖巻中乘時翊昌運磊落皆豪雄論思過丙夜魚水欣遭逢輝光驚時人文翰動九重粉繪勞相臣褒詞煩褚翁白雲鶴笙逺即此真方蓬勛業豈弗髙聲華亦云崇終然太平治所媿乃國風謀謨匪無材王佐自不同邈哉䕫契輩誰能寫其容獨酌有述沉憂如積痾紆鬱劇焚燎深在膏肓間異鏡諒難照往聖垂方書萬病皆有療獨兹莫措手渾沌無朕兆嘗聞達人言掃滌酒其要呼妻倒空罍數斟飲輙釂頓覺胸次豁豈懷酗酣誚頽然百慮忘濁醪信為妙秋日寄鄉中親愛秋氣慘以慄涼露日凄其感時憶親愛惻愴増遐思迢遞隔山澤悠悠各天涯念昔為舅甥于今成路岐逝者間存殁生者傷違離奈何綢繆意中道失所期復兹邈千里㑹合知㡬時撫事但心折懷舊空神馳願言垂暮景黄髮臻期頤翠爽樓幽居逺城邑山水有餘清層樓據其勝登臨怡我情曲䦨無人來卧起時獨凭空青襲琴書濕霧飄軒楹薰風滌煩襟好鳥相和鳴景物能解顔濁酒聊一傾油然既就醉意適心自平多財信為累達宦真虚名且盡今旦樂明日非吾營願言在槃澗養素安餘齡秋暑述懷局促過長夏荏苒届秋期初謂火既流涼颷掃炎曦豈料殘暑酷乃爾不可支我膺徽纆纒下共卒伍馳弱骨苦汗漬弊衣歎塵淄一身方在公寧復顧爾私雖無案牘勞莫任奔走疲幸兹城南厰頗與靜者宜時來解襟坐偃仰暫得怡我家文江上先廬有遺基何當乞骸去結茅樹桐椅期與世塵絶永隨樵牧嬉懷哉果何日浩歎徒歔欷甲午九日病中作謫官乆于役俯仰成陸沈豈顧歳時邁但憂才弗任如何孱弱質兹復病見尋蕭條卧空宇四壁但蛩吟山妻忽相謂重九今旦臨欲沽東隣酒垂嚢乆無金而我聽此語浪然淚沾襟婦云奚所為感慨亦何深拭淚向婦道爾豈知余忱老親隔千里兩髩呉霜侵十年違菽水慚彼返哺禽縱匪在憂患有酒寧獨斟妻亦重灑泣悲感不自禁婦人亦人子豈獨丈夫心秋日登雨花臺兹臺創何代遺址對逺川雨花不復見蔓草空翳然今晨逐徒侶偶爾凌其巓一眄周四顧梵宇相蟬聯黄金佛鑄像玉麈僧談禪側聞身毒教本自哀顛連誰哉繼虞愿浩嘆秋風前遊朝天宫示同行道者琳宫啟森爽蕩蕩寥陽天神君司雷霆見者皆肅然翊衞儼六丁陟降來羣仙空歌發遥唱秘笈開洞𤣥鳯扶五老駕龍驂列帝軿造化非形求道妙豈言傳希夷有像外溟涬無始先願隨鬱羅翹稽首太上前蔣節婦蕭蕭斜日夕肅肅悲風寒涓涓苦淚滴寂寂孤燈殘昔為比目魚今作獨宿鸞捐生下相從一死諒非難妾身豈足惜老稚誰為看節義古所重貧寠敢不安庶㡬泉路魂瞑目少自寛泰山或可移海水亦有乾惟應天上月長照妾心肝謁卞忠貞祠粉署得休暇偶登冶城巔令公有墓道灌莽浮荒烟遺容儼鸞鵠盛服嚴貂蟬褒贈䘏典重報祀時薦蠲緬懷臨難日力戰操戈鋋君臣義所重父子軀同捐豈伊一門間卓爾忠孝全晉士輕節槩放曠尚虚𤣥宜含瓦石者視死猶生年炳煥留盛名上與星日懸豈特式臣庶端足扶坤乾嗟彼負國徒亦拜祠堂前後来建康倅允矣希其賢題靜觀堂巻嘿處在林居沈冥遺世榮大哉靈臺妙止水湛澄凝括嚢視羣動擾擾紛自營細草沿虚砌佳木蔭前庭慮空念乃息欲淨理益明如何驅馳子終日沽其名清尊有醇醪幽居無俗情醉來澹忘言養晦樂餘生望方山有懷兹山如匣印整特臨都門傍顧衆􅄘少遥依鍾阜尊烟嵐結空翠泉石生清芬木秀澤時雨鶴歸投暝雲幽棲絶俗士游衍皆仙羣不見謝康樂我懷誰與論讀道書作疎林過微雨綠葉當窻垂緬彼古仙者秘言良難窺晝觀探其賾中夜夣見之玉色龍鳯質金章鸞鶴姿稱云瑕丘仲亹亹示端倪𤣥理貫而徹素心欣以怡伊余烟霞性早歳慕無為驚悟但虚室颷輪那可追謁趙文節公祠堂烈熖不容熄玉石俱凋傷宗社震蕩中大地多傍徨國祚倐云移成命真靡常興替雖有數節槩焉可忘明公倅大郡派系分天潢英氣凌雲霄髙操横秋霜爼豆固所聞軍旅非所長守土職攸重固當死封疆小君賢伉儷秉志與頡頏豈伊粉黛姿乃有鐵石腸所以顛危際賴之植三綱精忠嫓卞壼廟貎儼相望義比華嵩峻名齊日月光英魂在帝傍時復臨舊鄉何代烈士無豈獨張睢陽曾氏三貞堂客行蘭溪上有屋甚煒煌借問誰所居云是世節堂世節果何為一門凛三孀三孀本一姓婉娩金玉相父兄實佳士夫子各才良于歸期白首中道俱淪亡韶華豈弗念夙昔佩禮章捐生以相從之死庸何傷此身寧足顧老稚誰扶匡節義古所重焉敢違綱常無貽九京羞旌表非所望一孀逝已乆二孀政康强存者膺孝養没者留芬芳而客聞此語流涕忽沾裳寄言觀風使采之獻明光經浯溪讀元結大唐中興頌平生念浯溪鐫鑱有遺跡揚舲泝湘水登臨蹔來即穹崖倚層雲竒險自天闢漫叟詞既嚴顔公筆無敵鬼神屢呵護風雨長洗滌忠㮣儼尚存氷䘖猶可識端容歛襟讀感慨重心戚誰畫靈武謀大物取何亟唏嗟中興業諒重君子惜逡巡解舟去回顧三歎息曲江拜張文獻公祠嶺海號多士開先始興公大名照宇宙信史書勲庸遂令曲江重嫓美中州崇精誠日星貫爼豆春秋隆緬懷廊廟上蹇蹇王臣躬指兹逆豎首碎此干將鋒天髙聽雖卑竟莫回九重薊野鼙鼔動蜀道埃塵蒙範金肖遺像褒贈勞淵衷顧瞻祠堂間尚識風度雄白羽寓㣲意金鏡懸孤忠先覺百世師景仰無終窮懷哉秉鈞者孰與公心同遊柳山書院休政違炎方返棹及清湘考圖訪前跡懷古陟逺岡禮殿丹堊陊雩亭棘榛荒既感時代異亦憐爼豆亡蘚深碧侵堦蘿宻青蔓墻雉鵙有翔集衿佩無趨蹡陰菌依座秀晴蕤沿澗芳豈伊誦絃地而為樵牧塲撫俗思賢哲繼軌念循良視廢余誠怍舉墜職所當南藩如重踐庶或夙心償張節婦昔與君結髪綢繆百年期奈何届中道而有死别離相從固云易九殞分所宜殘喘匪自惜􅈱呱誰抱持姆氏夙有訓敢或違天彛明明夫子魂泉下諒有知少為張家婦老作張家嫠先姑炳遺烈誓欲與等夷他年樹雙表大字旌門楣重涖汴藩示流民汴藩控西北水陸咸此㑹太行如長城嶻嶪壯藩衞黄流自天來蕩潏勢何鋭土壤多肥美風俗寡浮偽云胡遽凋弊徵調靡寧嵗富者化貧窘窶者塡溝澮十室數口存一户百徭萃婦人廢蠶績杼軸悉空匱丁男應夫匠累載負租税偷生既難期逃竄非所畏嗟我忝旬宣重臨益驚悸勞來固迺職夙夕思盡瘁庶幾解倒懸疲瘵少甦遂矧兹聖明朝屢下寛䘏惠苦語示羣氓歸哉理荒穢九日郟縣小蛾眉山拜二蘇先生墓風厲羣木落菊萸涵露清令辰届重九促駕仍遐征逡巡及僧舍整拂塵冠纓懷哉宋二蘇此地餘荒塋石人俱摧仆壟土相將平趨祠拜遺像祇薦陳芳馨緬彼蛾眉山西望千里程兹丘亦何謂云胡冒其名徘徊盻林壑恍若聞金聲感彼詞垣仙托此舍衞城文章白日麗忠槩秋霜明徒令後來士仰止生深情蝻塜七月月生魄蝻出溱洧傍始焉學躍跳倐忽羽翅長所過赭郊埛矧復遺稻粱坐令飫飽腹立化饑餒膓督民殄斯類晨夕紛遑遑隳突踐壟畆炬火明山岡燎焚弱質燼撲擊微骸僵卒夫載朽胔絡繹持筥筐穿穴掩腥穢作塜官道傍罪浮彼破鏡雖死安能償蝮蛇實揺毒已疾傳醫方蜜蜂誠小物亦解奉其王畜蠶必吐縷世賴充衣裳畏蚊恐􅏐體幬幕席與床青蠅奚足憎赤蠆應可防編竹蟻知報勤誦螢聚光致雨􅔼蜴驗起痺全蝎良原性殊善惡稼穡咸無傷惟兹口吻酷黍稷爭先􅆷乾坤百虫夥去爾庸何妨吾將告宰造投畀魑魅鄉從今樂耕鑿歲歲歌豐穰崇福宫禱雨清曉戒徒御禱雨謁道宫焚香古帝前拜跽肅以恭因之感興亡華構乆已空尚有勅賜碑狼藉蔓草中慨想宋全盛鑾輿屢遊從名臣領祠職列辟儼睟容運往物隨改偉觀難再逢登臨睇烟霞頗惬眺望悰遲回不能去樹杪來長風觀啟母石夙負山水癖苦乏幽討緣幸兹崧與少秀色當眼前公餘陟峻岡忽覩石一巻特立四無隣觚稜不相聯云是啟母身化在郊墟壖呼之乃擘裂啟出仍完全幻語本荒唐昉見淮南篇遐想覆載間滄桑屢更遷安知運代移墜彼千仭巓厥理誠可推賢達固釋然矢詩正妖訛昧者庶或悛後世有豪傑為我焚其篇端午日遊少林寺少林聳岧嶤有路達蔥嶺半生懷勝槩老乃賤真境緇流逺見迓偏袒仍露頂升髙縱遐觀頗覺癡緣屏蒲風翻巻帙艾色侵衣領掇蔬僧具供飲騎童汲井自拈清淨香作禮􅅡古鼎超超昔神師順寂同溟涬而於片石上留此不㓕影竺夏雖異轍皆貴能猛省寒岩許分坐禪定畢餘景題王生巻王生事衆藝厥藝非庸常字格既超俗醫名將擅塲揮翰縉紳前懸壺闤闠傍時時拂華箋流麗兩三行勁健束筋骨端圓歛鋒鋩硯池墨波翻藥䦨杏陰凉家藏總秘帖囊貯皆竒方勉力當師承蜚英期頡頏誠心見焚劵清致歸文房八法右軍最諸科思邈良籠鵝與伏虎萬古同垂芳題雙燕圖寄表弟陳安行君家唫溪北我家郡城西君家梁間燕我家梁間棲我從出鎮來寒暑又三變不見故鄉春惟見故鄉燕挈家吉城邊寓家汴河湄燕識主人心相隨不相離念君千里隔見君㡬時得欲令燕啣書飛歸到君側君能弗吾棄為理白雲莊願言共君老看燕雙飛翔雪中偶至相國僧舍精藍創何朝規制極殊勝閻浮罹刼火無復莊嚴盛惟餘白足僧短褐露兩脛我於大雪中獨立偶乘興難尋金布地頗訝玉為徑娑婆絶塵翳似得天眼淨冷冷梵唄音細雜鐃與磬欣然遂忘返宿留逮昏暝乃知向上機無臺亦無鏡徒勞費辭說妙在悟自性世無毘耶翁孰拯衆生病願言投空門跏趺事禪定夢萱堂憶昔種丹棘期以怡親衷親亡故物在徒使増悲悰朝觀夕仍對詎料精誠通忽從枕上見宛與生存同欣然載言笑睇彼堦下樷森森鵠觜英相映慈顔紅芳莖挺清脩嫩葉紛葱蘢斕斒五采服煜比花色濃宜男既非望且遂忘憂忡驚寤忽無覩寥寥書室空想像抱沈痛淚落如流淙起視北堂植青青凉露中青城懷古炎宋尚簡質郊丘布為墻九門謹闔闢萬卒嚴周防暫置弗勞杵權施豈須隍綿延逮宣政驕盈更典章版築易縷製墉壕固金湯衮龍狩沙磧泥馬奔錢塘奢侈諒宜戒播辱尤所傷陶匏薦明水維馨仰前王林亭逺眺巻雙親乆淪逝遺櫬空山藏歲月諒已逺撫昔増感傷儀刑渺何之想像空徬徨悠悠人子心沈痛何時忘虛亭縱遥覽竹樹森微茫輕雲歛還舒列岫紛􅊠昂岩松布清陰溪艇浮滄浪騁望極遐曠白首在異鄉邈兹九京隔慨歎徒深長行行更回顧淚下沾衣裳老大心易感鞠育恩難酬顧瞻青青山髙塜山西頭憇兹灌木陰盻睐馳雙眸含悲睇天末若見墳與丘茅亭依水石屢至成淹留蕭蕭風樹枝欲靜不自由哀哀烏鳥情纒綿終靡休焉用徒耳為顯揚愼所修移忠古攸貴往哲有令猷先壟違别乆蔓草迷荒墟豈不念灑掃道路頻馳驅獨懸一寸心怵惕霜露餘王門固可樂窈窕曵長裾㫖甘亦云足弗逮將何如孤懷倍惻愴引睇西城隅洪濤曷能度疊嶂諒難踰歸飛乏羽翼注目空踟躇中和葢代英玉質神仙癯詩畫兩精妙風韻天然殊熈春富詞藻字字皆璠璵允為世三絶朂爾當珍儲重慶堂為錢儀賔賦客行大梁道華屋枕道傍借問誰所止閥閲何煒煌居人笑答言此謂重慶堂就中兩遺􅄔同志如雪霜賢孫英俊姿遴選賔天潢膳調三鼎珍樂奏絲與簧笄珈儼成列冠珮肅分行趍蹌二親側次第進杯觴百務弗相干暮齒彌康强家和福乃臻四序來禎祥玩匪宜男花心怡自憂忘姑耆婦仍壽鈞享百歲長客聞遽前拜重是雙貞良豈徒垂閫則庶以敦綱常送楊郎中催馬草還京大梁據中土自昔風氣旺北邙殊蜿蜒太室極雄壯黄河貫其間浩浩恣奔放四野開平衍桑柘綠相鄉丁男事耕耨姑婦治絲纊菽麥盈倉庾醑醴溢盆盎近歲頗凶屯旱暵觖農望念兹饑餒餘十室九鰥曠長貧負租税逺役困夫匠督蒭實賴公區畫咸適當深體堯舜心推仁憫凋䘮叱咤尚弗忍矧肯施鞭杖愧余謭劣才旬宣乏善狀竭力奉寛條庶减疲癃恙贈别陳民囏冀君徹卿相擬古𤣥穹惟湛寂元氣斗斡旋時序相禪續陰陽無忒愆乾綱后攸則庶政相斯專明良職其職四海自熙然吾觀日與月乃是陰陽精彼升此攸降循環有常經萬方仰臨照元良則其明離躔遂晦蝕惟辟修徳刑𤣥象雖緬邈人當思戒懲園綺遺世賢逍遥商顔巔安漢笑談頃視之何易然拂袖謝隆準採芝茹芳鮮今復有斯士吾將為執鞭黔婁貧賤士懷道棲衡門布被斜可殮曾西徒失言終焉諡康子萬古播清芬云胡有千駟殁世寂無聞吾觀古顔孟生民之先覺已克禮斯復陋巷亦云樂氣由養而充浩然塞寥廓其歿餘千年載籍猶昭灼天爵良可珍簞瓢未為惡方寸湛明鑑賢愚罔弗然浸滛汨私欲沈溺䧟危顛善性寧終昧清光應暫捐勉旃力磨治皎潔當如前芙蕖開清池花葉相掩映粲然薰風中容色自娟靜瑩同淑女姿直類君子性豈不念春華榮悴分攸定奈何徒征馳竟日事奔競蹁躚一黄鶴飛止弱水宫青鳥戴勝使側目不相容遂遺瑶池跡逺寄滄海蹤無心隨鴻鵠任爾摩層穹聞昔有逸民風標何峻拔超然凌雲霓遐視九垓狭跡雖戾中道心則忘窮達其人諒可希前進脂吾牽索居人事寡窮探墳與丘多謝東鄰客頻来為我謀乃為儒冠誤富貴别可求首干中常侍次謁北平侯㨗哉仕宦徑貿貿不知由讀書果奚益辛苦被時羞我笑而相答志殊各自求蕭條老布褐道在復何尤憶昔中園裏樟楠柯葉深芳葵種其下幽鬱冒繁陰靡瞻朝暾出鮮覿夕景沈縱昧昏旦候寧殊傾附忱小草本非異懷忠性所任誰當抑蒙翳庶遂向陽心森森鄧林木四序恒青蒼隨材就掄擇規矩因圓方其中有孤檜膚理尤堅剛挺特寡附麗辛苦受雪霜含章少外飾莫厠棟與梁美哉連抱姿而弗登明堂永惟松楠侣恥在槐樗行志士不茍屈撫樹空徬徨我本賤貧者棲棲在蓬茨蓬茨何所樂吾心自孳孳人言青山巔玉髓閟在斯服食仙立成深慚禀凡姿何如任其性雋味古文辭仰止曲肱叟舍此吾誰師荒哉煬天子縱侈樂無涯彛紀胡可瀆同心賜宣華獨孤雖云誤勇才亦非佳楊梅枯已乆撫事令人嗟題闕先生篤行士小隱南麓邊芥視功與名遺棄如浮烟造門非俗流問字皆英賢室空長物無匡床但青氊世受靜春學潛心最精専所以絶外慕昕夕勞鑚研斯文誠在兹樂矣卒歲年海㝢忽鼎沸羣氓弄戈鋋渠魁何狂愚馳書敢相延奮袂拂然起仰首呼青天誰為奪我志清白世所傳洒然擕琴劍樂道鍳魚鳶從此勿相逼清風激寒泉當此喪亂際三綱賴公全磊落貞松姿霜雪愈挺然九京不可作星日芳名懸因詩寄深衷歎息頽陽前題方方壺枯木竹石圖空山百尺樹質性何貞堅夭矯修篁側寂寞磐石邊亭亭任重姿屹立思擎天造化偶遺棄值彼蓬萊仙寫之若憐才崢嶸老龍騫朔風振羣木節操欣獨全寄言玩物者毋貴春花妍顔用正挽詩幽棲忘聲利抗志惟雲泉澄神以内照白首甘草𤣥既混釣耕侣詎希冠葢賢魄化名未泯塵凝榻尚懸服膺先民訓委順安其天誄文太史述遺經門人傳息䕃樹繞屋資生𤓰在田掩棺諒靡憾况乃獲歸全孔曾皆一轍此理豈今然哭子余齡及中歲有子生六年疾痛母心惴寒饑我懷煎鞠育愛雖切薰陶教宜先數日近方解誦詩未能全賦齡亦何短夭閼輙棄捐觸目恨山積沾衣淚河懸世澤懼斯斬書香賴誰傳嗣續人所重念之増惕然修已安義命昊穹諒無偏明喪笑商鄙情鍾慚衍賢螟蛉信么麽在物亦堪憐夏末偶尋洞惠道院曉起涼月淡絺衣坐肩輿灑然塵慮豁遂即道者廬蕭條殿廊存亭軒化荒墟山門憇樵農蘚砌鹿豕趍霤傾有墮瓦樹伐無遺株仙家尚消沉况乃俗士居蓬萊屢清淺此事諒弗虚吾聞至人言一氣運化樞莫窺機緘㣲孰外定數拘通由饑亡命載以賄䘮軀榮華豈乆在役智悲羣愚洞章二首縹緲大梵境玉京何寥寥空洞無色根泛兮若浮飄陽精鎮朗耀豈復知昕宵熣燦丹霞中浩歌白雲謡一聽衆緣息再聆羣累銷刼運自兹度稽首登神霄浮黎始上青浩氣長空濛溟涬窈無朕端倪那可窮梵川玉虛界不與諸天同羣仙時遨逰翳鳳駕赤龍年壽罔有極莫能測其終泛詠黄雲裏肅侍彌羅宫題翎毛畵贈葉太守名郡太行北水陸當要衝舟車日旁午来往無停蹤民貧困迎送矧值歲罕豐繿縷衣百結藜藿恒弗充前年太守来遴選出聖衷下車亟摩撫昕夕勞其躬還珠及渡虎有待臻全功我昔因入覲道經淇水東解鞍憇驛舍桂樹空庭中有鳥鳴樹間其雌和其雄物既適至性人猶含苦悰尚期盡生遂和輯比鳥同庶令盛明代再見黃與龔托畵表深意寧論描寫工丙寅端陽述懷歲月易流邁佳辰届端陽閑居昧時序節日如平常空園積雨霽蒿艾如人長蕭條掩關卧蝶夣方悠揚老妻喚我起盤飣勸我嘗小孫頗慧黠學語聲琅琅舉目見之喜欣然揮一觴儉約固予分泰侈非所望冥觀陰陽運隆替乃其常吾生幸休退用舍安行藏前修有善訓岐路多亡羊且復醉蒲醑毋將憂自戕丙寅初度作余生如稚松由寸望百尺既承雨露滋亦受霜雪積蹉跎踰七十勤苦曾備厯誤蒙明聖知謬忝中外職顧已慚菲薄於時乏禆益處盈虧必隨履泰否斯即至理諒在兹昧者固弗識叩閽乞殘骸休退恩㫖錫遂令犬馬軀獲返田野跡長揖畵省僚重負從此釋今辰届初度厨傳仍岑寂傍人競嗤笑窮約猶曩昔妻孥頗愧赧而我固悦懌平生守儒素晚節敢變易回思永樂初歲月類梭擲同年四百餘多已在鬼域存者纔十輩猶被利名役迂踈獨何幸林下得偃息遺榮遂安閑養靜忘跛躄游鱗泳清波覊鳥歛倦翼貧非吾所憂病豈吾所戚寵辱與升沉寧復置胸臆忘機侣鷗鷺植杖隨沮溺浩然天壤間俯仰惟意適長歌自為夀坐對逺山碧亡友舒州通判張君哀挽詩我昔遊禾州英俊森跌宕衆中昉識君彼此年盛壯定交文字間傾倒已見諒推能實居先論齒仍在上既欣氣味同復喜懷抱曠温温璞玉姿浩浩江海量豈惟邑校雄允謂士林望及門師易菴卒業侍凾丈大哉四聖經研究彖與象褎然西江魁足繼宋陳亮諸生老塲屋顙泚羞倔强詞垣七八年葭玉得倚傍編摩互論討疑惑共咨訪但期荅君親未省謁卿相佞色從古鄙直躬豈今尚始屈倅邦畿翻能拯民恙公平村有謡苦澹宦無况何期寒窶家忽被仁惠貺云胡去郡亟遂使失保障一官滯房山連歲董夫匠令名諸公推敏識多士譲政須峻陞遷溘爾遽凋喪呼天邈不聞為善匪可仗縉紳競悼傷輿𨽻亦惆悵而我忝深知肝膽兩相向切偲失箴規磨琢廢鑪盪情捐骨肉親序缺兄弟行前修不可作後進日流蕩哀哉若人亡士習趍謬妄紛紛夸毗子翻覆千萬狀譬猶蟻附腥繚繞沿甕盎疇能遏頽波奚忍鼔其浪孰知余心悲孤立誰我相令儀隔幽明清夢勞想像作詩述初終老淚恣横放春湖黃處士挽詩富順山水好春湖更無雙波瀾勢浩蕩昕夕聲淙淙黄公英特士竒氣未易降揭兹以自號傳呼遍鄉邦雅懷樂幽勝臨流闢軒窻課兒夜讀書短檠燦銀缸六經窺窔奥百氏刪紛哤魚龍每来聽出沒相舂撞有時岸綸巾隴頭看飛龍有時狎鷗鷺沿洄棹輕艭彷彿盤谷李依稀鹿門龎㡬年厭世去髙墳屹崆㟅苔蘚翳翁仲松筠列旌幢芳名嫓九鼎千夫莫能扛遺澤豈終竭深長配岷江伊人逝已乆挽歌富新腔豐碑著潛耀尚待筆如杠題感螺詩巻敘州富順縣孝孫有黃璿弱齡方及紀至性出自然祖母乆遘疾伏枕嗟沈綿絳宫鼎沸溢榮衞熱相煎飲藥如飲水終劑弗少痊頗思泥淖螺煑食或可蠲時當十月末凛如沍寒天陂澤各已凍此物求無緣孝孫黙致禱徑走南塘邊南塘路迢逓心急足不前匍匐至其處解衣漉清漣果獲四十餘紺若佛髻圓持歸更滌濯爇火烹甘泉調以醯與醬芬香絶腥羶病者見之喜飲啜隨下咽燥煩遽脫體阽危遂安全乃知一念誠可以格上𤣥造化宰報施錙銖寧使偏孫今陟顯位實秉郡守權兹事諒非妄詞林鉅公傳矧伊職師帥表率宜身先永言錫爾類詠歌繼朝賢題張教授居易軒行已素其位彰彰先訓明美哉留侯裔守分息營營執經侍彤邸講讀傾忠誠一室無贏積四序有餘清孰云禄秩薄豈受吏事嬰財豐真為累官達仍貽驚惟當樂夫天優㳺心自寧永言慎終始俟命歌隆平别子欽劉同年廬陵漢名縣黌舍當城南粤從宋慶厯傑構何潭潭穹碑泐學記歐子親題銜所以富才彦挺然皆梓杉游歌我昔忝遺經事窮探英俊非不多畏敬踰四三子謨與德讓奮起師易菴晨夕乆薰炙化雨深濡涵王門職輔𨗳胄監峩弁簪引之絶温潤欽止精研覃之宜暨仲舉問學青於藍惜未及貴夀早終四子咸篤實若陳李磊落俱竒男雄藩佐邦伯經筵進封函就中最傑特子欽文不凡壁經世授受道腴恣沉酣聱牙古盤誥同異互訂叅他人悉窘歩君獨行眈眈翰林俊聲著粉署刑名諳氷蘗豈論苦澹泊夙能甘擿奸若風厲讞獄同春含譬之龍泉劍光熖不可緘契濶五六載相思隔烟嵐追懷舊遊地㡬度聫歸􅆖兹焉幸一㑹壯志仍巖巖胸襟豁湖海論議森戈錟藩臬諸鉅公招􅌽列罌壜肥牲刺羊豕佳味羅蛤蚶鱠鮮旋烹鯽醢美細臠􅀈玉棋圓疊蔗金丸滿堆柑蔬茹剪霜韭竹萌掘冬䈄酒渴潄茗飲齒寒嚼葅蘫叨陪接几席答問吐鄉談清言霏玉雪傾聽我所貪亹亹續弗絶有如吐絲蠶握手萬里外綢繆樂且湛胡為又分袂行李僮僕擔于時一陽復兩鬂風毶毶東坡昔䟦渉渡海再遷儋未乆即見召還朝貌逾傪寂寥數百載繼武惟子堪歲寒見松栢大厦待楩楠賦詩寫繾綣空言只増慙情深覺詞贅此意諒余監枇杷晚翠江南有佳植名列果品中仙郎乃獨好官舍親培封亭亭異衆卉秀茂當嚴冬深綠冷逾茂繁青寒更濃滿樹葉葱蒨陰森宻成樷歲晏不改色傲睨雪與風所以玩物者愛比松柏同灌溉役輿𨽻賦詠勞羣公人物兩竒特永言播無窮即事功名事恬退求志在雲泉性本寡諧俗遂此遺世緣瘠壤百餘畆草屋數十椽耕耨有閒暇北窻髙枕眠人生慕富貴方寸徒憂煎百年諒能㡬倐忽成華顚種秫釀美酒庶以醉自全題商山四皓圖為陳徵士致廣題昵昵戚姬寵膠膠如意憐壯哉盤石基凛將殞而顚睿志慝深惑嘉猷忌讜言輔臣謀已拙壼閾憂徒懸遐飛四威鳳千仞來翩翩賴以為羽翼大本安且全翻然振歸翮遥想商山還兹事已云逺髙風圖畵傳運甓漫稿巻一
