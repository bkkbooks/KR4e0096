body:
  text: 運甓漫稿巻七明李昌祺撰詩餘柳梢青題具慶堂素髪嚴親酡顔慈母眉夀雙全屋潤家肥兒恭婦順孫更能賢夫妻快活團圓這想是前生福縁更積隂功仍行好事長享耆年天仙子題趙仲穆圖憶昔維舟湘水曲露浥芳蕤飄逺馥褰裳徐步踏晴沙東一簇西一簇盡日徘徊㸔不足嘆息光隂如轉轂老去觀圖揩病目花絶俗葉絶俗想像王孫清似玉公子才華偏藴藉九畹春光生筆下幻成花葉恰如真他看罷咱看罷不信根苗原是畫醉眼摩挲驚復訝端的人能移造化風不謝雨不謝一任巻將堂上掛玉漏遲慶表兄陳安行初度水風萍末起三庚乍退新涼堪喜玩竹吟翁此日瑞呈弧矢阿母親來慶夀賜玉液清香滑美端的延年却疾頥神健體快飲不敢推辭試跪啜纔吞六塵如洗換骨更形只消數甌而已自是長生有分便可在地仙班裏却説道人中再誰如你歸朝歡題送陳知府考滿灝氣漸消三伏暑商吹送涼侵白苧驛亭張宴餞邦侯管絃低處聞金縷明月映鶴渚殷勤頻勸杯中醑這九年用心撫䘏百姓似兒女青雲萬里期髙舉第一功名端的取曾覃惠澤及疲民仍將忠愛酬明主臨别聽我語巖廊接武夔臯侣把仙瓢好教㵼盡天下望霖雨臨江仙題墨菊送陳知府行一段秋光新寫就盛開不待重陽枝梢花葉互低昂巧將籬下艶幻作畫中芳為問淵明何獨愛愛他晚節寒香從今移種上林旁時時承雨露嵗嵗傲風霜摸魚兒辛丑生朝自夀笑吾生為縁凡骨神仙親遇難度隨羣逐隊一作倒來顛去埃塵裏年少遽成衰暮忙退步這鳳翼龍鱗老拙難攀附况當末路亟納禄投閑養疴延夀隨意做詩賦懸弧旦罔極親恩已負持身惟謹清素繁華易歇同朝露嘆㡬箇人能悟非義富非義貴石崇元載何須慕乘除有數全晚節尤難粗衣淡飯天自管分付沁園春山荘即事山是何名族為甚姓地本荒涼水逺土磽田狹衆人棄置天教與我卜築成莊嶺月為朋溪雲當客更有林風時送涼養衰病惟靜窺周孔黙契程張升沈寵辱都忘且懵懵騰騰醉㡬塲到東門嘆犬華亭嘆鶴悔之晚矣徒自悲傷幻夢軒裳生涯筆硯陵谷從他海復桑幽閑處謝天留老眼坐閲興亡玉漏遲送費同知考滿之京螺川清徹底地靈人傑俗敦廉恥闔郡民家十有九家詩禮幸得循良二守共撫字政平訟理多少貧窮感戴章逢稱美倐忽樂及𤓰期㸔課最天官上聞丹扆不次超遷位聨六卿班裏此際同寅北望比别箇倍增歡喜端的是人生似公有㡬滿庭芳賀人生日四月年六十梅彈垂金柳綿飄雪緑隂清晝偏長畫堂初曉慶夀沸笙簧花甲從頭再起任教他烏奔忙懸弧旦纔登耳順痛飲又何妨年年逢此日新茶新筍件件堪嘗喜子能幹蠱孫戰文塲那更閑身自在且休論紫綬金章人都道天留老眼安坐閲滄桑玉燭新夀舎弟昌明初度春光忙似箭又三月初三牡丹開遍卯君初度當今日祝夀惟深繾綣八人同氣但只覩五人顔面我一箇分外龍鍾難似四人强健如今骨肉無多但有興能來且休辭倦更教兒姪願箇箇努力聖經賢傳空詞一闋笑寫當袖中鵞麵期嵗嵗生朝持杯乾勸摸魚兒懐舊記昔年十分輕健秦淮白下遊遍結交盡是高懐侣多伴舞衫歌扇心眷戀縱雨阻泥妨幽興何曾倦曲房小院有鯽鱠銀絲蟻浮緑醖暢飲醉仍勸分離也恰似雲鴻海燕音書特寄無便風流杜牧今憔悴謾想柳眉花面江萬轉山萬疊怎生能勾重相見光隂似箭回首是衰翁思量前事清淚落如霰鵲橋仙自述儒冠相誤虚名相誤衰病又還相誤自憐身世總無成乾枉了青春虚度書生曾做京官曾做方面也曾親做顛來倒去竟如何只落得一貧如故長相思春雨朝淋漓暮淋漓到處墻傾土屋欹放晴知㡬時濕花枝洗花枝平地瀰漫浸作池簔衣終日披怕傾盆要傾盆傘笠都無强出門滿身泥水痕行厭聞坐厭聞溜響從朝達夜分聒聾雙耳根南鄉子送人之京北上别家山韋布趨朝識聖顔水路七千端的逺艱難了却公家事早還暑退夏初殘拜别紅雲虎豹關歸日正逢秔稻熟加餐受用鄉園暮景閑石州慢詠青娥眉淡竹草異草從來花别另一般様顔色藂間開遍既非紅紫又非黄白閑園曠野多少黛嫩螺嬌氷盤帶露侵晨摘磁鉢放輕研翠脂凝光澤竒特最風流處寳鏡臺前繡香奩側想未惞勻面慵將填額懶施粉餙且付描扇描圖底須去問倭夷國誰製與佳名也端然消得水龍吟題都帥馮侯乃子二樂堂豫章徐孺湖邉粉墻畫㦸元戎第高閎晝靜踈簾風淡博山香細椿樹長榮萱藂鎮茂荆花連蒂有珍殽脆滑純綿輕暖凡奉養都加意先祖竭忠帝室到如令子孫承繼將門有將非徒英勇仍能孝義百戰成功萬鍾為養也知容易願斯堂八柱堅如鐵拄永留人世木蘭花慢慶夀過元宵五日燈山罷夀筵張喜盛集親朋爭喧鼓吹滿泛壺觴八仙共教童子送蟠桃封寄與翁嘗甘比玉杯雲液冷如金碗氷漿佳兒拜捧上高堂擘破散竒香恰半枚入口身田温暖腑臟清涼管取延年却老轉顔紅髪黒更瞳方此去纔周花甲從頭再數何妨賀新郎新婚冬暖天晴霽燦三星居然在户煥輝庭砌照見堂前荆花樹一朶忽成雙蒂聴花底笙歌聲沸傳道仙娥辭洞府跨青鸞喜㑹文章壻態窈窕容端麗知郎早有凌雲志小科塲探花手段好教先試仍把風流京兆筆巧畫翠眉纎細却慢慢大登科第况是妙年諧燕爾且親前齊著斕斒戯衆喝采好兄弟一半兒長河新漲漫平沙古塚斷碑横曠野日晚牧童争望家笑喧嘩一半兒騎牛一半兒馬臨流農圃蔓𤓰苗拍岸客船依葦篠月落五更風露饒櫓雙揺一半兒猶昏一半兒曉風流子題周㕘政南峰書舍巻錢塘最勝處龍井畔此地是君家有垂桞引鶯古松巢鶴石栽蒲草池種荷花客來訪緑衣鋪座席紅袖過湯茶評史講經賦詩觀帖竹間棊局忩下琵琶况湖山清雅僧房占不盡水竹烟霞贏得老辭畫省榮賜烏紗便重尋舊隠歌當細聽酒當滿泛休問其他人道昔時書屋今更光華水龍吟題鎸蘭亭石工陳福巻右軍真蹟蘭亭秘藏玉匣昭陵久驀然驚見夜光明月煥輝忩牖穆穆誠齋濡毫臨出逺過顔柳把瓊鈎寳畫比方古本此本斷應居首冩在金箋紙上競傳觀怎禁磨揉故教鐵筆連圖入石要令難朽羨爾良工藝能巧妙于今稀有細㸔來恰似生成喝采那雕鎸手醉春風書所見雅淡嫌華麗嬌容原自媚如何驀地忽相逢記記記眉掃春山裙拖秋水柳腰纎細黙逗文園意錦字憑誰寄雨雲幽㑹甚時諧未未未知共何人翠幃深處鎮偎鴛被長相思春日郊外桃未紅杏未紅近社郊原尚似冬連朝頻刮風麥茸茸草茸茸菜吐黄花三兩藂春光何處濃柳梢青題秋塘圖落盡芙蓉收殘菱芡晚色凄迷斷荇隨流枯荷折柄秋老蘇堤沙禽自在幽棲極浦外天連水低粉墜蓮房波漂菰米煙暝湖西㸃絳唇新柳東面風來旋吹輕緑回梢上眼兒纔放便做嬌模様到得成隂早又花飄蕩隋堤望和煙搖颺人去愁相向念奴嬌寄致政朱紀善先生柳綿飛處政和風淡蕩輕飄晴雪憶殺故人千里外客館怕聴啼鴂桂水危亭虞山古廟㡬度同登謁君歸吾去可憐辜負竒絶長是夢見風標晨鐘㪣醒無奈依然别去嵗魚箋蒙逺寄惟冩相思情切乞得閑身㸔山玩水著甚酬風月只應詩酒興來還自怡悦蘇幕遮題清溪漁隠浦雲收山月放紅蓼灣頭秋水生新漲一箇輕舟雙槳蕩蕭散江湖富貴非吾望擊空明浮滉瀁汀鷺渚鷗處處長相傍馬首紅塵三百丈風吹不到蓑衣上滿江紅送陳僉事兄還鄉春滿梁園韶光媚盛開桃李清明過數他花信只今餘㡬有客携書還故里畫船且向沙頭艤問此行歸去甚時來明年裏征帆挂離歌起杯易盡情難己羨君家賢弟列官風紀更道翁能敦友愛連枝同氣稱雙美想細君笑聴鵲聲喧門頻倚一半兒風髙飛鴈斷還連野迥宿雲舒復巻箇箇緑楊堪繫船水連天一半兒原深一半兒淺天淨沙藥竈時燒榾柮松庖日饌伊蒲寧用雕盤鏤俎天寒嵗暮村村風雪黄蘆枯松倒挂懸崖寒梅正對空齋慣見山光水色不求身外黄金任築高臺滿庭芳自述年衰病攻旬宣任重仕進心慵縱令勉强成何用齒豁頭童急退步離他閙叢便隨意學做荘農辭官俸勤耕苦種嵗計不愁空橋庵野夫文章本少事業全無半生苦被虚名誤早乞微軀納印綬辭歸里閭買田園教繞村居忘形處麻衣草屨放浪狎樵漁閑中自憐人心不足世事難全算惟引退真長便過活隨縁嘆老矣非徒此日賦歸歟且待明年思量遍心闌意倦極品也徒然榮枯吉凶都由自己不屬天公得時莾把聰明弄逞盡英雄怎知道禍因惡積錯埋寃命與灾逢床頭甕香濃味重引到醉鄉中江南故鄉山青水緑竹翠松蒼年來旋把幽居創菜圃禾塲㸔花訪黄家四娘挿秧倩許宅三郎忘官况狂吟醉唱退老白雲莊追思舊游芳年豈再勝事都休㡬回暗數當時友半在荒丘將馬上風霜弊裘換鷗邉野水輕舟天成就忘懐宇宙無喜亦無憂天涯自傷叨恩禄厚永恩心長故園遥在西江上㡬度斜陽好弟妹相抛殞亡老情懐只抱悽惶那堪望雲山煙浪真是斷人腸歸田興饒官登二品世閲三朝粉闈畫省皆清要誤玷元僚愛隠逸煙霞海嶠戀恩榮雨露雲霄量才調休閑最妙偃息伴鷦鷯蹣跚病軀人憐顯宦我笑貧儒烏飛走何曾駐白盡髭鬚有斷簡殘編可娛無贏金剰帛堪儲清幽趣爐香一炷坐愛小忩虛光隂易遒諸般勘破萬事宜休抗塵走俗乾生受著甚來由賣了帶安排買牛綴成簔准備划舟招朋舊晴忩永晝濁酒且淹留盈虛往來亡身為色喪命因財乖的罷了愚的在莫笑痴騃種地畝動薅草萊啓軒忩淨掃塵埃心無累逍遥物外且放好懐開金字經喜舎弟昌明至雨意斑鳩喚春光杜宇催剛得相逢怎便回陪旋蒭新釀醅同歡㑹飲乾休厮催門掩斜陽暝簾垂靜夜長兒女燈前笑捧觴嘗滿杯清更香懐宜放醉呵能㡬塲瓦釡芹羮美磁甌茗飲清垂老天倫喜合并聴兩三歸鴈聲鳴相應感咱同氣情白丁留跡少紅甲迸畦稠淡泊相㸔不强求休老身今自由心無疚隨意度春秋運甓漫稿巻七
