body:
  text: 運甓漫稿巻五明李昌祺著七言律詩遐齡十景遐齡仙境西山秀矗碧芙蓉浩刼天真宅此中飛瀑倒懸清灑雪層巒逺聳翠摩空珠林有樹皆棲鶴玉澗無泓不蟄龍列缺蜚廉皆擁衛綵雲長繞萬株松玉隆仙府淨明宫觀軼浮埃紫氣丹光接上台地夐難尋茅落處天空猶想錦飛來江湖孽去沈淪拯沙井源通障遏開鍊質仙岩應在此不須東海訪蓬萊石泉靈瀬跨鳳仙人杖有靈卓開岩竇見清泠絶勝猛虎跑來潔不帶潛蛟鎮處腥春漲暖添三日雨秋澄涼浸一天星風瓢㡬度穿雲汲坐愛潺湲洗耳聴天寳雲深洞天原自異人寰可惜梅生分太慳參杞熟來俱不食神仙遇後竟空還靈呵鬼䕶金床隠電掣雷轟石室關蒼狗白雲長靉靆恍疑移下玉京山紅崖疊翠曾聞千仭岧嶤頂上有仙翁隠碧雲蕉葉懶揮塵自逺楓枝不悴景長温丹光迸井清宵煥霧氣埋山白晝昏積黛凝嵐轇轕處藥爐茶臼至今存緱嶺朝霞晨暾乍出上榑桑散作竒文五色章暘谷影高爭煥爛赤城標建逺微茫曾為燒佛禪師號復作修仙道士粮若使有縁逢子晉便求嚥嗽上升方蕭臺積雪六出花飛尺許深吹笙臺榭盡瓊林長空鶴下巢難認薄暮樵歸路莫尋玉壘更添仙境勝氷崖不受世塵侵匏簧冷澁無遺韻贏得琴留折竹音龍岡雨霽何年神物此中蟠化作竒峰紫翠攅水落樹根猶半濕泥沾花片未全乾天東初日一輪近隴上閑雲萬畝寛最好連山皆白石霶𩃱洗出玉鱗寒鸞岡秋月銀盤端正掛瑶天灝氣寒光兩鬬妍白鶴儀鸞成恍惚黄塵清水嘆更遷五行秀淑兹山聚百種禎祥此地全應與三仙同不老坐㸔兔魄謾虧圓鳳岡夕照綵翮高飛去不留斜陽長自射岩幽織烏沈處晴霞斂巢鵲歸時暮靄收翠鎖雲蘿千嶂暝紅堆霜樹一林秋人間此是通天竅未必丹丘勝藥丘送王處士益安之京亭亭别舸艤江干緩唱離歌勸酒乾老驥尚馳千里足㝠鴻已鎩九霄翰江雲盡日低連水淮雨兼旬悄釀寒多病子牟心獨苦遥瞻魏闕五雲端蒲帆穏掛一舟輕珍重高年事逺征飛絮遊絲縈别恨落花芳草黯離情山中暫輟幽人社輦下爭傳處士名回望南雲鄉邑近秋風江上笑相迎閒身應暫别林丘垂老觀光帝里遊地控幽并通絶漠山連恒華拱中州辭家去日逢初夏買棹歸時及早秋南北兩京饒故舊相過慰藉少淹留自笑龍鍾雪鬢毿十年因病解朝衫清時引退憐身老白日冲昇愧骨凡漠漠平蕪連薊北依依逺樹隔江南經行定過淮陽郡歸計煩君促阿咸送曾行人還京專對多才列顯融十三藩翰有行蹤官寮盡識荀鳴鶴郡邑爭㸔陸士龍江上曉霜凋杜若城邊秋水映芙蓉經行處處饒佳景總入高情賦詠中四牡騑騑聳衆觀梁園邂逅暫相歡襟懐磊落真佳士職任清閑最好官楊柳不禁秋後折茱茰且向醉中看懸知歸獻王褒頌三峽詞源在筆端乍見何堪又别離蕭條况值暮秋時無才報國慚空老有約歸田嘆已遲風悴井邉梧樹葉雨乾籬下菊花枝空緘徒有寒温問不敢煩君寄故知官亭且暫駐行装更盡臨分酒一觴同榜故人皆要路離羣倦客尚他鄉涼風嫋嫋蘋花白夕露淒淒杏葉黄後夜夷山高處望析津惟覩使星光留别王教諭士敬汴省分携又四年他鄉一見倍堪憐白頭納禄慚予晚綘帳横經羡子賢燈影颭風臨水店櫓聲揺月下河船匆匆㑹面匆匆别回首長淮一慨然磊落才華邁後英鄉闈早占甲科名持衡西陜端無忝分教中都倍有榮畫鼓升堂黌舎曉青山繞郭縣樓晴丁寧勿嘆淹閑散早晚吳公薦賈生黄河㡬曲繞荆山楊柳隂中帶暝灣老子得歸全出處故人相見雜悲歡從教健翮縱横上且喜閑身自在還莫負明時勤造士坐聴絃誦到更闌寄石潭劉先生并李鍊師偶因衰病返丘園白首依然混俗氛寧復嬉遊來勝境徒令夢寐想清芬秋山秀色終年對天路空歌每夜聞宴坐萬松蒼雪裏不知塵世有囂喧久不班荆話夙心逺勞封茗寄雲林殷勤諫議情偏厚憔悴文園渴正深十載鄉音憐斷絶㡬人交誼篤升沈看雲倍切懐君意離恨悠悠可自禁相鄉朋舊總英賢久乏鱗鴻寄尺箋令子俱為天上客阿翁都作酒中仙堅持苦節共先訓順受微疴了宿縁社櫟任他松柏笑支離却得保餘年挽某孺人婉娩雍和著令儀如賓相敬世應稀遺衣尚有親縫線殘綜猶餘手斷機零落堂萱霜已悴蕭條園薤露初晞兒孫拜掃蕭坊塜梧檟西風葉亂飛題蕭于京巻吾邦自昔産才英畫手如君藝更精柱國少師題舊隠經筵學士表新塋優閑有興詩兼酒落魄無心利與名猶記京華曾識面白頭回首故人情寄龔廉使并虚谷僉憲秋鴻春燕各西東回首天涯一病翁晚嵗懸車應愧我明時攬轡最推公才名未許張綱擅清徳惟期趙抃同從此雪山知更重羣賢風裁兩爭雄雨中發洪都豫章城下水如苔風雨官河一棹開山色遥連蕭寺暝雁聲遥度楚雲哀霜凋逺樹寒燈見鳥背孤帆極浦回畫棟朱簾遺閣廢荒基嵗嵗長蒿萊訪鷺洲書院遺址宋家書院但空名二水中分草樹平陵谷變來基亦廢野人耕處草還生落花細雨文魚上殘柳西風白鴈鳴臨眺不堪懐徃事城頭畫角更淒清舟次安慶層層雉堞石崔嵬小市參差野岸隈賈客㠶檣沙際落人家樓閣水邉開英雄埋没成塵土墳塜荒凉翳草萊莫上高城重弔古東風斜日使人哀春坊黄學士索賦劉縉草堂二首靜者茅堂近翠微蓽門松徑往還稀水生南垞鴈初下月出西巖人未歸迸筍亂穿苔蘚破殘花故傍薜蘿飛清泉繞屋雲林宻縱有淄塵得染衣石角藤枝似瀼西懸蘿引蔓覆簷低雲來高樹虚窗暗春去深林好鳥啼蛛網靜粘飛絮雪燕巢新補落花泥碧山學士能相過咫尺滄浪是浣溪喜陳七表弟至客舎蕭條忘却官愁顔暫解强為歡相逢尚憶兒時事乍見渾疑夢裏㸔故國有田供嵗計他鄉無絮耐冬寒明朝又作天涯别且對青燈共夜闌秋夜聞砧萬遍千回擣未休踈星涼月夜悠悠酒醒空館聞偏苦老厭他鄉聴更愁綃帳銀屏霜氣早黄雲白草塞垣秋妾心已逐寒聲碎憑仗風吹到海頭送孫吉士省親還浙勞勞亭畔送將歸莫惜離尊醉落暉霜葉暝随淮水下風帆晴向練湖飛還家只喜庭闈健到處仍憐故舊稀綵服寧親兼晝繡人生得意似君希賦落花愁紅怨粉各依依樹下偏多樹上稀總為春光爭艷冶却教夜雨妬芳菲數枝浸水魚吹去㡬片縈林蝶趂飛莫怪東風成薄倖猶能收拾㸃人衣送同年曾侍講扈從北行二首長樂踈鐘曙色催千官扈蹕出蓬萊香飄輦路鸞輿至日射天袍雉扇開九域車書同盛典兩京詞賦屬雄才從容得侍清閑宴更捧南山萬夀杯天子宸遊幸北京從官誰是最知名青鸞紫鳳隨行在玉碗金盤出内庭芳草細承宫珮軟飛花故落御衣輕𢋫歌何限鄒枚匹獨説相如賦有聲寄彭修撰李吉士二同年千里迢迢隔兩都雁歸不寄半行書只縁久别交情薄自是長貧行輩踈細雨落花朝退後游絲飛絮燕來初故人寂寞芸忩裏遲爾封緘慰索居書館即景二首十里金河繞内城城邊闌檻逼人清池萍過雨馴鷗下苑樹呈隂好鳥鳴入座水風翻帙亂隔忩簷日漾波明萬年枝拂宫墻翠時見雙飛粉蝶輕溝水斜通宫苑近回廊遥接禁垣長千層雉堞圍黄屋百囀鶯聲在緑揚曉霧暖浮空翠色春流晴泛落紅香無端景物皆佳興更愛鍾山樹欝蒼車駕南還江東驛拜迎有作鳴笳疊鼔震淮山共喜時巡大駕還畫㦸雕戈羅萬騎紫駝白象列諸蕃讙聲逺度旌旂外香霧長浮罕畢間雜遝都人多似蟻一時拜舞望龍顔送鮑琮之吉安教授送别因君憶舊鄉郡城南面好徜徉青山秀落屛風裏粉堞高環學舎傍佳句欲成仍對酒春衣初試更焚香老親林下知相見華髪應添别後霜元日早朝熹微曙色半氤氲閶闔初開鹵簿陳雲表露凝仙掌重仗前風細珮聲勻雪消鳷鵲千門曉花映鴛鴦合殿春久侍朝班無寸補年年此日沐恩新病中酬周吉士忱見贈二首自嗟淺薄負明時更嘆長貧少故知書巻病來荒舊學柴門客去重深思花容有態隨春老藥力無功得效遲擬學無生消世念惟應禪寂共襟期為客何堪倍憶家還悲伏枕度年華病魔不逐青春去醒眼惟愁白日斜已覺尫羸踈酒盞更憐憔悴負鶯花方書藥性偏多忌猶説逢人擬斷茶送劉生還鄉不辭千里問庭闈綵服如何又逺違新鴈近隨秋共至故園遥喜客初歸空林向晚鴉爭集衰柳驚風葉亂飛應愧殊方飄泊久㸔雲送别總沾衣春日南宫對雪退食南宫㸔雪飛塵埃頓覺一時稀千門曉色連青瑣雙闕寒光照粉闈倦逐梨雲飄舞袖閑隨柳絮上朝衣高才莫續梁園賦却憶盤洲獨釣歸孝陵春日陪祀二首鶴駕乘春謁寢園日華浮動原闕黄鶴翩翩不可招玉棺夜墮𦵏王喬已知妙行書仙籍又見褒封下聖朝俗眼謾揮蒿里淚清風閑却竹宫簫真人道業憑誰傳虎觀鑾坡盡久要送人之淮安税使花雨消塵草色新金川門外是通津江雲片片低連水穡燕飛飛近掠人畫燭牙籌官舎夕緑蒲翠柳郡城春懸知公退多幽賞淮水淮山賦詠頻南郊分獻禮成有作鳳盖鸞旂下九關豐隆列缺䕶郊壇星臨行殿鐘初動月射齋宫夜未闌佳氣直浮雙闕外祠光遥在萬松間相如未覺才踈薄誰道明朝獻頌難寄劉貢士孟恂二首河橋雨過柳條新野岸氷消草色勻㡬處秦樓春自好一瓢顔巷客長貧流年不用悲明鏡高誼惟應愧故人翹首石潭潭上路東風那得有車塵竹屋無人靜掩扉病身坐愛暖風微悠揚甕底醯鷄舞撩亂忩間野馬飛家在江南田地少年來海内友朋稀登山臨水情何極惆悵高懐與願違寄同年曾學士子棨青春載酒立鰲峯兩扈宸遊㸔㑹同日暖雲旂翻白􅰒月寒天闕倚蒼龍閑庭幽草芊綿緑别苑飛花淡蕩紅侍從詞臣多似雨長卿作賦獨能工早朝金河秋早水生涼清漏沈沈夜未央闕對鍾山通御氣露摶仙掌溢寒光天垂複道星辰近月隠重城睥睨長粉署由來多俊彦獨慚題柱漢仙郎孝陵秋日陪祀柬彭贊禮永年鍾山欲曉色蒼蒼小輦輕輿出建章苑鹿不驚仙仗過潭龍故噴御泉香重城隠霧留殘月高樹含風送早涼惟有祠官最清貴時來導駕沐恩光悼貴人百戰功成初拜侯貂蟬雉尾換兠鍪丹青擬上麒麟閣紅粉空餘燕子樓郿塢有金僧施得平津無客妓來遊若教富貴兼難老江水應須北向流太廟臘享同吏部王郎中吏部丁員外刑部蕭員外陪祀有作寳砌瑤堦積雪稀齊開金鎖敞朱扉五雲光裏來華盖萬樂聲中拜衮衣鳳輦乍移清廟闔龍旂輕拂上林飛禮成冠珮參差出佳氣祥煙繞禁闈秋日獨遊黄鹿山望𡺸策寺二首梵宫遥對鳳凰臺此日乘閑偶獨來古墓石麟空蔓草空祠土像翳塵埃溪光淡淡秋鴻下野色蒼蒼夕鳥回不用咸陽原上望西風臨眺亦堪哀青龍山下人煙少黄鹿庵前日影斜隔塢寒松遥見寺平田晚稻正垂花芰荷蕭瑟鳬鷗水莎草棲迷雁鶩沙弔古自應增感慨非關久客在天涯挽張楫川處士二首寂寞秋山落日邉草堂人去鎖寒煙移家北里無華館供祭南山有薄田零落幽蘭餘澗底蕭條寒菊對門前天涯莫致生芻奠灑淚西風一慨然華屋山丘事已非先朝遺老近來稀徒令過客題新塜猶有行人欵舊扉衰柳謾餘陶令宅荒苔空没子陵磯故園朋好凋零盡暮雨寒雲弔鶴飛挽集方陳處士寂寂空林長薜蘿集芳園裏落花多幽堂有石銘先泐舊宅無人客獨過海内生芻慚古道淮南藂桂想遺歌山陽回首悲鄰笛欲賦招魂奈爾何九日獨登雨花臺追用杜牧韻客裏登高思欲飛乾坤但覺此生微關河迢遞親垂老松菊荒涼人未歸六代空臺餘古塔㡬家新塜對斜暉寒煙蔓草西風外惟有秋荷好製衣題求志山房巻久忘軒蓋身將老高卧雲林事總抛酒熟只知留客醉家貧惟喜借書抄雲迷高樹猿窺果葉墜空林