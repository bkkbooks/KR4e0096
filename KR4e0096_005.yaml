武功秀色青如染只好閒看靜掩扉送人還文江二首客中寥落畏秋來况是逢秋送客回家在鄉園惟夢到身兼貧病復年催衣沾殘雨衝寒去鳥背孤帆帶暝開良㑹㡬時仍話别臨岐分手重徘徊帝城相見總相憐忘却飄蓬謫宦邊官舎蕭條秋雨裏鄉音厯落夜燈前數株衰柳門常掩㡬杵殘鐘客未眠惟有多情天上月清光遲爾到家圓送蕭知縣復任臨淮石城臘盡覺寒微百里重臨願不違潮落斷冰隨水去林踈敗葉著霜飛長江白浪帆來逺細雨黄蘆雁下稀相見未㡬還又别離情鄉思兩依依復職再至南官舊署三年流落别南宫舊事新來總不同清世未容辭組綬病身寧想到方蓬趨朝又註金門籍待漏初聞紫禁鐘自幸為郎叨載筆却憐執㦸漢揚雄舎弟客錢塘索家書冩此示之故園書信久荒涼愁對西風見雁行身在京華依魏闕夢隨潮信到錢塘乍添老態經憂患漸入中年易感傷閒㸔白雲惆悵久不知清淚已沾裳郭處士挽詩嗟君久隠白雲間地下修文竟不還謾有琴書閑别墅獨留墳墓在荒山春風自種陶莊柳暮雨誰紉楚苑蘭忍向江鄉詢故舊百年遺老半凋殘喜錢進士習禮除翰林檢討賦此寄之清才玉署正相宜錦字華椷慰所思霄漢㡬回勞夢想酒杯何許共襟期小忩殘燭懐人夜斜月踈鐘聴漏時知在詞垣吟更好便鴻莫遣寄來遲寄曾學士子棨白門離别已三秋閒對停雲憶唱酬心共星辰常北拱夢隨江水亦東流千門曉色春初動萬瓦寒光雪未收獨有龍頭金榜客解將詞賦扈宸遊寄刑部李主事時勉周主事恂如二妙翩翩最好辭拜官同在白雲司一身多難憑誰問三載離羣獨爾思紫陌香塵聨轡處絳紗銀燭候朝時才名獨數枚臯盛肯把新題寄所知冬日與彭贊禮永年登冶亭吳人冶處有遺亭與客尋幽暫一登東下江流通海白南來山色入淮青踈鐘晚送歸巢鶴落葉寒敲近樹扃最愛孤高䦨檻好㡬時更共故人憑再用前韻柬前人二首東南形勝壯兹亭閒共孤雲野鶴登淮水寒光天混碧鍾山秀色樹浮青空林槭槭人初去落葉蕭蕭户半扃六代衣冠埋草莽由來富貴信難憑金陵無數好臺亭臨眺偏宜此處登江滙海門諸水黑天連秋浦九華青雲旂晝下瑶壇靜石髓春香玉洞扃鳳想鸞情霄漢表不妨暫借赤欄憑孫處士挽詩彈冠不遣世相知明月清風每自怡山水半生資雅趣江湖㡬度滯歸期白雲長伴蘇門嘯宿草空餘薤露悲何限丘園棲遯者誰人身後有銘碑段處士挽詩不將名姓達時賢長在蘭陵野水邉數畝薄田手自種㡬聨佳句客爭傳清談久廢圍棋局問字空回載酒船惟有孤墳鄰季子東風無處薦芳荃宋處士挽詩漫浪江湖酒與詩玉簫明月好襟期老逢昭代承平日生在元朝喪亂時健翮不隨黄鵠舉閑心惟有白鷗知全歸地下如公少迢逓南州重我思送人之北京水緑蘋香鳥亂啼汀洲芳草更萋萋人分殘雨雪亭外鴉背斜陽極浦西江柳受風偏舞困林花經社競開齊天涯春色傷離思莫惜臨分醉似泥柳含煙裊霧自青青愛近官橋與驛亭春滿章臺偏婀娜秋深隋岸最凋零長從蘇小門前折㡬向龜年笛裏聴絶勝東風桃李樹飛花猶解化浮萍送陳郎中重使西域次曾學士子棨韻六首纔持玉節出咸京策馬仍為絶塞行北闕風雲冲劍氣西河將校仰威名懸崖古塞千尋險衰草荒原一望平多少羌戎爭出迓使星昨夜到邊城歸朝重㸔拜司封又出陽關第㡬重路入伊吾沙闕齋磬山鳥銜花落石床澗底風回喧地籟岩前日出散天光俗塵不染祇園士坐學無生與世忘駕幸朝天宫祭星之作上帝蕭臺衛百靈儲皇拂曙醮羣星清都秘籙開雲篆白晝神雷擲火鈴曉露未乾珠樹濕天風微動寳花零叨恩久在南宫裏長從鑾輿幸冶亭四月十八日鶴駕再幸鍾山余與大理寺丞鄒公師顔户部郎中林公和楊公端員外郎張公賓暘石公堅聨騎從小徑行憩松隂候駕有作萬畝松隂一徑開象王此地有樓臺春殘好樹驚花盡風度和鑾識駕來香篆半銷僧定久鐘聲欲斷鶴飛回空門景物多清賞未解朝衣愧不才送彭贊禮之北京五月驅車過薊門黄金臺下駐行轅千林果熟新經雨雙闕踈鐘逺度雲星斗芒寒環北極山川形勢壯中原情深不忍輕分别更上高樓一望君送人還南康梧桐葉落火西流楚客驚時問故丘百畝腴田環舊宅㡬人白髮在滄洲二賢祠下蟬聲晚五老峰前鴈影秋見説匡廬多勝處何因來共赤松遊送于生還鄉紅槿花稀夜合殘行人千里問鄉關客情偏在初秋裏旅夢頻生半醉間細雨帆檣投極浦孤村燈火隔前山西風無限滄洲意欲採芙蓉愧未閑送上舎之北京官槐涼露曉來收之子含情解去舟閣道千門開北闕關河萬里壯中州月低高樹重城曉風漾微波太液秋此去彈冠問知己故人天上扈宸遊送熊生還鄉石頭城下柳蕭踈久客懐歸念逺途鄉夢每生鐘斷後客愁政在酒醒初扁舟暮雨青衫薄折葦涼風白鳥孤擬共丘園尋别業臨岐相送獨踟蹰原闕鴈憶鄉書西風嫋嫋蘋花老欲續離騷賦卜居酬曾學士子棨見贈復職之作放逐仍居患難中三年執役梵王宫病來短髮逢秋白老去衰顔借酒紅心似葵花傾曉日身同樹葉感霜風杜陵花竹頻生夢但覺陽春處處融讀元進士李祁雲陽集神情秋水態春雲菽粟甘腴布帛温菊徑秋風陶栗里柴門落日杜羌村鸞歌鳳吹排空逺蚓竅蠅聲到處喧縱有黄金那可鑄寥寥騷雅向誰論張舒州家觀元承㫖危素畫像虞揭凋零玉署空堂堂至正獨推公氣全河岳英靈秀手抉雲霞制作工江總歸陳翻恨老賈生鳴漢早稱雄丹青似有無窮意却冩南冠入畫中擬唐宫人入道笑著黄冠脱翠鈿改粧風韻更天然元君便授中堦籙阿母新留大洞篇雲雨已無當日夢煙霞或有夙生縁清齋夜禮羣星罷學鍊丹砂繡閣前詠燈花羞向明開向暗開芳藂暖燄照銀臺須㬰爛漫都成蕋頃刻凋零半是煤綉幌不愁踈雨至紗忩只怕猛風來歌闌舞罷人歸寢一寸丹心未肯灰懐劉貢士孟恂學館相逢意有餘青燈緑酒夜忩虗眼㸔世事宜高枕身在他鄉念逺書落日暝歸投樹鳥清潭時見避鈎魚秋山若有蘇樵地擬結茅堂傍隠居春日遊池州梁昭明太子廟池陽山水郭西雄華構蕭條一半空野蘚春沿香案緑岩花晴照衮衣紅千年此地留遺跡六代何人有故宫𤣥圃已荒文選在令人終古仰高風登齊山翠微亭傷春惜别總關心愁對鶯花思不禁外地逢人偏感慨他鄉弔古强登臨天連秋浦帆穡逺日射晴波島嶼深猶有翠微遺趾在樊川佳句重南金遊揚州繁禧觀廣陵城下暫維舟謾向繁禧觀裏遊春日長林啼好鳥暖煙芳草載驊騮柳空隋樹堤仍在花落雷塘水自流弔古不煩頻感慨瓊花芍藥總荒丘濟寧州學觀漢碑崔嵬雉堞啓重關學舎荒涼禮殿閑孔壁已傾塵半掩漢碑猶在字將殘庭槐入夏當忩緑野蘚經春上砌斑鎸泐至今餘古意摩挲竟日不知還送林推官復任吉安二首薊門秋早雨潺潺苧服涼生暑氣闌眼底貧交如我老郡中廉吏似君難偶因論舊懐幽處何敢投閑戀故山遥想軒車重下日芙蓉開遍菊開殘黄金臺下見歸鴻送别因君思不窮白髪庭闈千里隔青雲冠盖㡬時同政憐出牧難為守猶喜平反獨得公鄉郡近來非夙昔豈無凋弊待春風召赴北京留别靈谷定岩戒上人長憶煙霞水石邉高僧於我最忘年栴檀樹底焚香坐優鉢花間掃榻眠了幻未能辭五濁觀空自可斷諸縁無衣無帶堪留别林下分攜一慨然送周知縣復任句容月淡霜清禁漏殘朝回初退紫宸班來飛葉令雲中舄歸㸔茅盈隠處山城邉棠樹應多種壁上蒲鞭只是閒列宿垂輝皆拱北郎星獨近太微間送王㕘政之江西東南形勝大藩雄襟帶江湖百粤通紫氣虹光牛斗上落霞秋水畫圖中㡬年凋弊憐諸郡今日旬宣賴數公送别因之重懐土浦雲山雨思無窮讀元楊仲𢎞詩才名卓犖四賢同進士詩人兩萃公周鼎殷彞推范古天機雲錦讓虞工江湖汗漫遺編在風雅蕭條大筆空玉樹瓊枝那可見閒花野草自青紅送毛生還鄉積雨初乾露欲霜儒衣秋半不禁涼離離墜蔓敦𤓰秀纂纂垂林小棗香薇省久抛邦伯印柴門最憶野人莊盤洲水與環洲接投老歸來掉釣航清明日憶先妻客裏淒涼感慨頻禁煙時節更酸辛鶯花謾濺中年淚燕麥空揺異縣春徳耀獨憐成薄命黔婁誰與共長貧難將杯酒澆荒塜腸斷東風倍愴神庚子元日旭日熹微散曙光忽逢元日倍沾裳久隨塵土房山卒曾厠煙霄粉署郎蒲柳豈知渾易老屠蘇猶憶最先嘗惟餘一寸丹心在絶似葵花只向陽慶成侍燕時署禮部事輕霞殘雪絢朝晴又慶南郊大禮成鶴禁𢎞開排列仗鸞笙低奏度新聲金花只覺簮來重寳篆頻㸔裊處輕立近紅雲清切地叨恩更比去年榮二月二十六日欽頒天花祥雲瑞光圖至自北京并秦中所獻𤣥余忝署禮部事陪百官致辭稱賀退而有作柳暗花明禁禦春寳圖頒瑞示廷臣雲霞燁煜天光近河漢昭囬御墨新秦甸已㸔來異周郊又見出祥麟太平嘉應多如雨獻頌何人筆有神送羅司訓考滿便道回家嬌鶯百囀柳三眠忍向青春别客氊芳樹暖風來燕候柔桑麗日浴蠶天路經山驛逢人少家住鐔津喜地偏若向他鄉持教鐸封書好倩鯉魚傳遊龍濟寺暫息塵蹤泯世縁且留金地禮金仙三生石濕垂蘿雨百衲衣薰煑茗煙猛虎跑泉松户外馴猿投果石龕前春深絶頂人稀到花落閑忩僧自禪熊翁挽詩㸔山釣水逺辭氛榮辱升沈寂不聞濁酒一瓢留客醉芳花㡬樹許人分竹林羣從多能賦芹泮諸儒每過門膝下有兒今白髪猶將老淚灑孤墳次儀真入廣陵細草新蒲緑滿洲人家多住水邉頭淮雲過雨晴猶濕江霧凝寒曉未收老樹數枝依野廟飛花㡬片在漁舟誰知客子思親苦謾道青霄萬里游徐州膴膴平原四望通周遭官樹覆崇墉浮橋小市東西岸亂石奔流上下洪白鳥微茫踈雨外青山明滅斷雲中黄樓制作皆名筆惟有灤城賦最工徳州江上南風起浪花江頭新柳集鳴鴉長懸雙轂牛車穏流水孤城雉堞斜沙燕穴巢穿斷岸汀鷗伺食立枯槎平原更比青原好何事行人只憶家四月二十七日拜廣西之除賦此志喜紫殿沈沈禁漏稀金鋪齊啓掖垣扉已知側席求賢俊詎料掄才到賤微選榜乍題香墨濕朝官初退軟塵飛南藩此去中州逺敢憚驅馳駟牡騑泊祁陽縣峭壁懸崖百轉灘奔流砥石響潺湲驛征遥指天邉樹詩境頻㸔雨後山香稻垂花當夏熟芰荷折柄近秋殘自憐不及澄潭水靜照孤雲野鶴還石期驛獨宿懐鄉萬里驅馳負簡書桂花開遍雨晴初忩敲落葉空庭靜門掩殘燈古驛虚露冷踈林驚宿鳥江清逺火見歸漁天涯回首懐親舎欹枕無言意有餘桂籓城樓桂林繞郡皆竒觀勝槩登臨此更多五筦雲山連越巂百蠻溪水滙牂牁籓垣愧乏涓埃補嵗月真成漫浪過只把新詩當遺愛他年留與野人歌峽山寺峽山竒處飛來寺門俯澄江落木邊猿解賦詩悲往事松能托夢保餘年曇花貝葉高僧榻瘴雨蠻煙過客船安得此身無繫累蒲團共坐閲空詮庾嶺筍輿度盡嶺西東不見梅花只見松華扁空堂丞相廟寒泉枯木梵王宫雲連瘴影峰峰别水帶春聲澗澗同無賴山桃并野杏芳菲到處競新紅重過全州湘山寺野殿荒涼户半開昔人題字已侵苔却憐蘭若成塵土那得閣浮免刼灰蜕骨龕中僧久寂留衣海上客重來忘情不為耽禪悦貪㸔青山日落回送人之廣西雕甍畫省晝沈沈我昔旬宣此暫臨五嶺地連諸郡逺兩江路入百蠻深薇花舊種應爭秀棠樹新栽未布隂父老不嫌無恵愛逢人猶寄别來音寄同寅周布政名藩共説廣西東比却中州勢更雄署列三司尊省憲疆連五筦壯提封承流宣化空慚我易俗移風政賴公無限相思山水隔㡬時冠盖可相從解空寺鷲嶺駝峰似削成下方雷雨上方晴傍岩高樹巢溪鶴隔塢踈鐘震海鯨花氣濃薰僧衲潤茶香遥沁客懐清幽尋未有重來日且挹風泉聴梵聲贈商人浩蕩江湖徃復回春光秋月任徘徊翠眉歛笑歌金縷紅袖籠香捧玉杯贏得閑身渾未老莫教歸思苦相催人生行樂知能㡬莫把芳心變冷灰寄致政彭太常永年三首長避時人友鶴羣秦淮明月蒋山雲欣逢有道辭簪紱贏得無家念子孫湖海詩名今已著煙霞癖性老仍存忘年不是朋游少知已惟應獨有君久住天丘號羽人萬株松柏一吟身秋林掃葉安茶竈雨逕留苔當坐茵仙境道心同寂靜詩情字體兩清新相從擬學還丹訣尚恐縁應隔兩塵未解天􅋶解世縁心情長寄海鷗邉松風石瀨輸孤聴梅月山忩憶共眠未信留侯真辟穀也知郭子託遊仙憑誰為起青牛老共究希夷象帝先愛梅軒兩株低亞小忩邉冷淡姿容夜更妍露挹清香來枕上月分踈影到簾前郎官東閣應無夢處士西湖景有縁偏是年年氷雪裏孤根長自得春先寄高道士髭鬚長黑髩長青椿比年齡鶴比形爇盡名香朝碧落坐穿孤榻鍊黄寧松高却礙秋㸔月草軟偏宜夜禮星難挹風標徒悵望海天空濶鴈㝠㝠庚戌花朝愛閑長日掩衡門懶步芳堦惜蘚痕百嵗光隂將大半一年春色又平分梨花開到簷前蕋蒲草青回石上根永樂初科逢此日三塲正試禮闈文晚春郊外七首春雲春霧朝朝雨煙壟煙畬處處泥隨水落花千片去隔林好鳥一雙啼筍穿苔蘚青痕破草混薰蕕翠色齊安得更如年少日尋芳買酒郡城西柳外輕風拂面來春忙半是杜鵑催多般野菜參差老㡬様林花接續開竹為近堦難迸筍松因臨水易生苔追思徃日嬉游伴聚散如雲倍可哀九十光隂大半空減衣時候又相逢柳濃偏妬羅裙緑花淡還欺茜袖紅酒興已隨詩興減老懐爭及壯懐雄誰能不動傷春感况在千愁百病中楝花將綻艻花稀蒲筍初生竹筍肥山鳥喚晴相對語園蜂趂暖作羣飛羞將艷蕋簮烏帽笑指垂楊妬緑衣兩兩牧童殘照裏齊吹短笛跨牛歸青鞋布襪踏斜陽枳殻山樊撲鼻香宿草驚鷗相對白採花蜂蝶欲爭黄圓浮水面荷錢小細裊波心荇帶長猶記秦淮西畔路秋千競出柳隂墻雨外林鳩不住啼落紅狼籍半沾泥秧苗帶穀根猶淺麥榦垂花穗已齊鷗下只投荷葉嶼蝶飛多傍菜花畦青水緑山饒詩景歸路扶筇醉懶題筆硯圖書且暫停尋芳聊傍水邉行禁煙巷陌偏傷雨修禊天時不厭晴堤柳折來憐色嫩野棠開處愛香清南朝舊日歌鐘地煙草萋迷晚照明雲溪清趣巻層層片片舒還巻漾漾溶溶長復消濕掛松梢晴訝雪曉漫沙際暖生潮孤飛出岫為霖早百折朝宗赴海遥光影徘徊竒絶處徽絃時向靜中調題楊子恭先生所蔵畫巻懶尋捷徑問通津高卧南州樂隠淪姪可承祧勝有子田堪供祭不干人江風山月諧清興野竹溪梅作近鄰除却賦詩觀畫外更將何事累閑身萬壑千岩路欲迷幽居更在亂峰西野人茅屋秋臨水農父村舂夜隔溪霧雨山中同豹隠煙波海上共鷗棲續貂忝厠先親後展巻風前灑淚題辛亥七月廿日晚出汴城南門高槐細柳晚生涼緑蔓青蒿宻覆墻菶菶敦𤓰長引蔓離離新黍未登塲千聲到耳蛩吟切㡬陣横空鴈字長衰憊若容辭享禄買牛歸去種山莊夜趨尉氏縣倦憩新倉鋪肩輿頓撼似乘車暫憩郵亭息病軀清露清風三伏末殘星殘月五更初農家圃廢蓬科宻野店燈明葦箔踈縱是黄埃兼赫日尫羸何敢憚馳驅雨中督民捕蝗西風吹冷雨蕭蕭駭蝻驚蝗亂擲跳高壟低原泥没脛長坡漫地草齊腰黧形餉婦鶉衣濕赤脚田翁鶴髪飄安得縣官皆卓茂野無螟螣稼豐饒洧川田家榆繞村莊柳繞垣緑隂深處啓柴門平蕪滿野牛羊卧落穗盈堦鳥雀喧蓑笠雨晴當户掛機梭夜靜隔鄰聞餘年深覺為農好望斷南雲想故園首山乾明寺梵王樓殿首山隂布地銷殘刼後金香閣晝昏槐柏暗衲衣秋冷薜蘿深浮雲靜似高僧意流水清同長者心佳境獨憐難久駐暫停征騎一登臨裕州山中即景曉露凝寒未結霜農家禾黍喜登塲千林紅葉兼黄葉㡬樹青楊間白楊疊嶂層峰雲氣宻奔流亂石澗聲長山深盡日行人少野菊花開著處香光州道中陂陀丘阜間平岡相望人家隴阪長野水陂塘來雁鶩村莊籬落散牛羊茨菇葉爛冬前雨枸杞苗枯露後霜行郡計程餘兩月冷風寒雨過浮光途中有懐寄内浪逐虗名鎮别離憑君莫怪乞身遲欲投組綬優游日須及兒童長大時世事已知閒是好病軀况與懶相宜黔婁已決歸田計白首耕鋤定可期宿汝南田舎荒原漠漠一茅茨野老相迎半白髭道上塵埃埋馬足簷間忩牖翳蛛絲平坡莫辨袁安塜老樹空傳李愬祠極目黄蒿兼白葦令人慷慨起遐思光州公館半消殘雪濕苔磚過客來稀路自偏木榻有塵皆䑕跡土墻無篆不蝸涎隔年春意梅知早大地風光柳得先欲訊山川與民俗圖經殘缺欠重編辛亥花朝平分春色恰相停處處秋千日日晴柳為迎風偏婀娜花因臨水更分明尋芳已負嬉游興對景徒添感嘆情猶記南官曾獻藝白頭無補負恩榮滄洲程隠君挽詩翛然萬事不關心日日尋僧傍竹林雨後幽泉隨鶴汲座中芳醑對花斟秋風老圃千株橘夜月虗忩一曲琴惆悵閩南空谷裏何人還解嗣遺音題鳬繹歸耕巻遺榮老去喜懸車鳬嶧山中問故廬數畝腴田皆種秫一生清俸只收書露畦麥穗童爭拾煙壟𤓰苗手自鋤好共鄰翁濃作社不妨沈醉有孫扶和秋景韻秋風刁騷淅颯驟添涼催得朝西緑橘黄萍藻約開渾有力芙蓉吹綻竟無香未飄吳苑楓千樹先隕隋堤柳數行送得漁舟湖面去釣絲撩亂颺波光秋天玉宇寥寥覆八垠琉璃滑處不生塵一痕新月梳浮黛五色晴霞繡展茵靈鵲有橋横碧落仙槎無路泛青旻夜深濃露多如雨洗出銀河一𣲖新秋雲纔逐商飇濕客襟又過蕭寺䕶松隂清江亂渡低連水紅樹輕籠懶作霖掃葉僧驚迷去路倚樓人訝失遥岑晚來忽起長天外頃刻濃遮日影沈秋光離離霜樹葉初乾野色川容總帶寒獵馬競嘶騰逸足鞲鷹快奮展修翰黄蘆洲外斜陽渡紅蓼灣頭亂石灘極目園林蕭瑟甚桂花飄盡菊花殘秋峰黛髻螺鬟聳晚涼層巔暑退似經霜金梯近倚丹霞影玉洞長含紫霧香解夏林僧歸寺早趂晴樵叟入山忙松巢擬結高高頂靜閲人間海與桑秋意庚金應候雨收初一葉飄飄墜井梧苧服不宜臨水坐藤床已愛背風鋪衰容未入溪頭柳爽氣偏凝石眼蒲頗覺今朝非昨日炎涼何苦自相驅秋聲只訝潮音海上來那知風雨在高槐號呼奮發悲兼怒曲調低昂去復迴豈待胡笳清淚落寧須畫角壯心摧北忩況有翛翛竹一夜聴殘白髪催秋色寒鴉候雁滿晴川㸃綴郊原罨畫天老葉著霜渾似染殘荷出水不成錢纍纍橘柚斜陽裏嫋嫋芙蓉淺渚邊門外晚晴詩景富吳歌一曲採菱船秋氣蘋末風來拂樹林砭人肌骨冷森森銀釭向夜侵燈影玉塞連朝結野隂紈扇淒涼先入匣琵琶哀怨漫沾襟何須慷慨悲揺落呼酒香橙樹下斟秋懐自憐詩酒半生耽痛飲狂吟老尚堪知己更誰如鮑叔懐人惟我似羊曇菱花羞向燈前照菊蕋慵將客裏簮强欲登高望丘壟白雲迢遞隔天南秋波茫茫淼淼渡無舟逺浸煙莎没盡頭緑葦叢邊拳一鷺白蘋花外戯雙鷗斜陽曬翅鸕鷀飽新漲漫天舴艋浮漁父不知魚不食尚乘涼月坐垂鈎秋思雙蛾長蹙怨離居不見銀箋寄到書清淚清愁孤枕上殘鐘殘夢五更初已無佳句題紅葉謾有餘香在繡袽怕近黄昏聴絡緯更堪雙杵動村墟秋隂拂地連天障翠微吹開渾不怕風威梧桐失影空金井茰菊籠香艷綺闈清晝每疑涼雨至長時只訝濕雲飛自從過却重陽節少見曈曈日色輝秋雨滴瀝空堦不斷鳴淋漓徹夜到天明殘荷只送蕭蕭韻落木仍兼颯颯聲竹榻寒驚僧夢醒松忩涼助客吟清杜陵屋漏無乾處喜見晨霜早放晴秋晴九月江湖潦水清木綿花吐雪爭明寒來處處催砧響社酒村村沸鼓聲禾黍郊原肥雉菰蒲洲渚聚鷗鶄遥天似鏡無纎翳只有聨翩雁影横秋月白波浮出碧波晴上到天心覺倍明香霧雲鬟人搗練涼風露榭客調笙劉琨塞外憑欄嘯張渭湖中載酒行曾是廣寒攀桂手龍鍾猶想賦登瀛秋涼氣候蕭條漸欲霜家家整頓夾衣裳鷹爭刷翮超雲海鳥怯浮波立石梁濃露一宵催茉莉長風㡬日悴桄榔吳儂只憶江南好紫蠏初肥白酒香秋蟬山蜩渾未覺涼生猶韻金風咽復鳴總為螳螂能愛惜却教蟋蟀讓淒清難諧趙瑟秦箏調慣和樵歌牧笛聲按盡宫商黄葉裏那能不遣客心驚秋信梧桐新月照空床紈扇西風淚數行好夢只隨鐘共斷閒愁偏與夜爭長最憐牛女同今夕却恨參商各異方薄命盻盻并小小料應不似我淒涼秋鴈㡬陣參差度驛樓嗈嗈肅肅下滄洲涼波挽共鴛鴦浴煙渚晴隨鵠鷺遊逺去解傳邉使信㝠飛恐堕弋人謀蓼花菰米瀟湘岸飽食何妨伴野鷗運甓漫稿巻五
