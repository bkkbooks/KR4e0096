body:
  text: 運甓漫稿卷二明李昌祺撰七言古體郡庠古柏行泮宫翠柏真奇特溜雨霜皮古銅色共傳賢守李侯栽年數于今過三百幾經劫火幸仍存草木猶依聖教尊清覆講堂間永晝密籠禮殿翳香雲芳根長托絃歌地壇杏庭槐共生意春風搖影漾宫墻午日流隂上庭砌博士鳴鼙散學徒競來樹底縱歌呼喬柯寧集接輿鳯細葉爭巢朱博烏却憐種者今何在留得青青表遺愛文風化雨沾濡深從宋厯元逢盛代上摩北斗凌中台時有佳氣相徘徊大哉宣尼後凋訓珍重明堂梁棟材潢溪釣者逸間軒白髮潢溪釣遊者半生浪迹棲林野已慣為農夜飯牛寧能執䇿朝馳馬只知物外無喧囂飬花種樹東津橋縱橫坐席雜樵牧傾倒甕盎忘晡朝醉來就床且髙卧一枕從教日西墮蓋世功名逝水流薰天富貴飄風過煙霞泉石聊徜徉青雲要路非所望乃知靜處有真樂却笑時人何太忙陳上舍所藏蔡主事墨竹粉署政間聊自怡運毫濡墨寫竹枝宋時二子誰最好今日諸公君獨奇露梢風葉新圖裏藂色翛翛紫鸞尾郎官醉筆掃將成上舍髙情得之喜明窗淨几絶纎埃嫋嫋長竿若可裁白晝間將堂上挂丹山定有鳯飛來髙道士所畫山水伊誰丹青擅能事畫出羣山與山似樹杪如聞雪瀑泉林間疑有雲門寺杖藜橋上知何人抱琴可望不可親髙師指點笑相語我昨圖成殊逼真賦得小孤絶壁送人還鄉海門砥柱長江滸東南羣流皆下經蕩摩霄漢壓溟渤鎮控吳楚資神靈百丈懸崖實奇壯銀濤雪浪相舂撞層顛俯視飛鳥背曲徑斜通白雲上中有重淵龍伯都瓊宫貝樓如玉壺天晴蜃氣秋成市月冷鮫人夜泣珠羡君歸去過其地政好登臨騁遐睇賈客爭祈天姥祠妖巫謾設彭郎祭解纜開舟肯暫停乘風破浪如流星明日思君不可即天涯惟見此山青送周大尹復任清河分陽令尹宜峻遷銅章墨綬却仍前東風上林白鼻馬細雨韓橋畫鷁船桃源過來是花縣聞道吏民懷宓賤別處城下草生初到時邑中栁舒遍奔流忽見濁清痕岸上人家是郭門鬱蔥王氣濠梁近迢遞官程淮汴分羡君佳政人不如兩臨百里馳芳譽剩將此際循良迹留待他年史館書送張教授改任鳯翔客舍暄愛日旗亭冽霜風故人有逺宦䇿馬之關中識君今餘十五載幾度思君夢華采别後音徽煩屢寄交誼重逢不曾改似君才調世豈多手援健筆如揮戈門生問字每載酒道士寫經頻送鵝九年作官南海上文與波瀾相浩蕩今為冷椽向鳯翔岐山渭水周故疆隴雲秦樹真可畫絳帳橫經復間暇座上青氊自足娛眼前白髮何須怕我本踈狂迹不羈與君情好最相知殷勤不勸杯中酒寂寞徒吟卷裏詩琴清軒野客本沖素瑤琴何靜淵層軒久絶俗士迹緑綺自上朱絲絃初彈徵調聲古淡澤國葦寒鳴旅雁再彈宫音如逆泉氷盤亂走珠璣圓斯須改調羽仍角灑灑明珠相續落秋冷瀟湘見斷雲春和鸞鳯鳴阿閣吾聞伯牙昔善琴後來不復傳遺音如何到處聽者少悠悠山水空髙深銀筝錦瑟人同喜流蕩娃淫悅俗耳衛國誰知擊磬心齊門孰識吹竽恥三尺焦桐只獨怡希聲大雅世豈知但令妙解徽絃趣不必黃金鑄子期送劉博士從征交趾并貽梁御史鄧主簿沛中才子容臺客半世經行遍南北去年隨駕獵長楊今嵗從征破殘賊從征還得侍青油中軍帳前參密謀盾上頻看草文􅊾軍前屢見獲俘酋梁侯鄧簿皆同調對酒筵開能謔笑綵筆宵成露布辭紫泥曉下班師詔論功大將畫麒麟先數風流幕下賔豸冠行拜勞還寵烏府仍稱獻納臣湖山佳趣歌半生甘作隱者流兩屐不到侯門遊老去髙情付林壑間來樂事只漁舟春水泛花漾孤嶼杜衡蘼蕪滿修渚晴樹逺連江上村晚雲忽作溪南雨自憐身世兩悠悠濯纓濯足忘吾憂萬鍾懸爵本非志一竿在手何所求門前學種五株栁逸興雅懷到處有對客石床撫古琴留客山瓢斟濁酒年年嵗嵗適間情皞皞熙熙度此生已無天上鵷鸞夢且結湖邊鷗鷺盟蘭秀軒聞種幽蘭在庭際爭秀競芳如謝砌客來談詩坐髙堂入簾飄席但聞香宣尼緑綺寄三㺯屈子離騷歌九章嵗寒不凋復不悴夏芷冬蓀寧足貴此花芬馥淡且清願爾諸郎同德馨善人比潔真無愧燕姞為祥良有徵風輕露冷美間夜更愛國香長繞舍軒中有蘭人好看圖上看蘭空是畫送缺生還鄉羡子翩翩世莫測三十今猶隱鄉國陳平非是困長貧賈誼終當射奇䇿于今應暫賦間居釣水樵山心自娛甘旨時供二親養燈窗夜對一床書昨日公車召尊府青雲有官未曾補天涯豈但鞅掌勞膝下惟知别離苦嵗月蹉跎會面違回頭又復念重闈柴門落照迎歸客童稚升堂競挽衣有才勿向山林老功名在人須及早胡為寂寞環堵中窮巷年年長秋草題徐太守所畫掀蓬梅花圖紛紛卉木凋零早獨有江梅冬更好天寒嵗晏風泠泠野橋無人流斷氷南枝爛漫北枝少恍如玉貌千娉婷酷憐隨月印沙影更愛臨崖近水形當塗太守今黃霸名重華光補之亞酒酣自寫復自題餘子持縑終不畫初開盛吐俱含態將飄乍落皆有情玲瓏輕霰簇鏤玉蕩漾明珠疊碎瓊昨來盧君新卷裏寫得長梢最妍美疏蕊凌寒似得春暗香撲鼻疑生紙世間畫手多凡流惟數徐君筆最優不必掀篷棹飛雪觀圖何異在扁舟送周生還文江周生磊落志不羣餘子紛紛那足論書香道國先賢裔宦譜平園丞相孫少小聰明已堪惜炯炯雙瞳剪秋碧當代諸兄固罕儔往時嚴父真勍敵江鄉屈指擅聲稱青雲步武宜相承致身要展胸中略閉户宜窮窗下經男兒猷為貴聞早萬事無如盛年好佇看唾手取功名莫遣低頭嘆衰老兹行賦歸何時來元方遲爾黃金臺勿隨斥鷃藩籬下枉却驊騮泛駕材送陶給事升閩憲僉事江上草新緑都城春雪晴玉缸擕酒共君飲紅亭醉醒空離情問君此行何慷慨攬轡超超渡閩海青瑣多年舊有聲赤心一片終難改玉節觀風八郡傾人人同仰范滂名陶潛解印身雖逸桓典乘驄衆所榮判袂相望不知久渺渺青山重回首別後含情空憶君謾對蕭條白門栁賦得海門潮信送黎眘之還鄉海門蕩潏深千丈潮去潮來如有期夕陽欲沒退偏早晚月乍升生太遲退早生遲自無爽行人到處占消長終年空打崩浪磯半夜遙通女兒港清淮不泛鴟革魂潛來默去朝復昏汀洲但見沙禽迹島嶼惟餘石蘚痕黎君晏嵗乘潮去路指海門奇絶處覽勝應知造化工吟清信得江山助解纜開帆舉畫橈泝流激浪隨風飈回首行人不可見往來惟見海門潮題施生吳山圖伯鸞自安田野性季鷹謾有蓴鱸興何似施生住日邊吳中山水壁間懸山水蒼蒼絶垢氛看圖不異在吳門亭間一叟書長把樹杪飛流響不聞蒼苔白石菰蒲緑溪上誰人補蘿屋數拳晴雪見棲鷗十畝涼隂翳髙木我昔巢棲五老顛松風桂月伴雲泉朅來委質事明主敢念池魚思故淵瑤枰謾想溪邊奕碧草空懷洞裏眠緘情劃爾發長笑清宵夢繞香爐煙題意上人卷意公優遊樂禪寂獨鶴片雲比蹤迹半世辭家念已忘諸方乞食人皆識水月觀心無減增曾參達磨禮盧能手持解脫千年錫口誦楞伽萬變經風幡不動空緣業深悟菩提賴言説慈性圓融任去留幻身聚散輕生滅我欲歸投選佛場蒲團貝葉共禪床金螺山下尋蓮社白鷺洲前結草堂送張生遊金臺幸遇太平日觀光快嬉敖春衣白鳩舞暖帽青貂袍都城列雉森崇墉榮光喜氣何蔥蔥風雲觀闕異人世皞熙自與華胥同張郎英年頻此遊憑髙弔古窮冥搜盧溝曉月帶氷渡昜水秋風終嵗留豪來得意金不惜秦樓楚館皆相識飛觴醉殺青蛾眉紅錦纒頭恣拋擲詞垣鑾坡總巨公古文奇字比揚雄填門請謁不輕豫揮灑淋漓盈卷中卷中題詠真奇絶珠貝晶熒玉重疊夜郎誰數李青蓮湖海詩聲久消歇南來北去屢往還半生多在江淮間經行到處且歌笑莫教辛苦愁朱顔愁朱顔易蕭索大夫慎勿念功名紫馬馱錢買歡樂題三友卷世人結友結貨利知君結友與人異半生締交只三物對之不言心已契偃蹇虯龍當檻蟠氷魂翠袖靜相看因悲薄俗隨冷暖聊托幽芳共嵗寒願君終身勿相棄豈必彈冠復聫袂苦口雖無藥石言同心實有金蘭義君不見紛紛輕薄流朝作刎頸暮作仇人情真似翻覆手三友貞姿寧易求朱紀善夢草軒朱從軍伍間其弟逺省竟沒于彼夢春草春草滿池塘謝子空含淚王孫幾斷腸夢春草春草池塘滿麗日友于情悲風死生感夢草轉堪哀繁霜一夕來凋零餘片葉憔悴只枯荄他人夢草得好句我夢草悲紫荆樹少年夢草已傷情老來夢草骨亦驚幾回枕上睡初覺殘夜孤鴻不忍聼柏室楊家住在南山側不種棠梨惟種柏棠梨開落易衰榮柏也亭亭色鎮青屈曲靈根蟠厚地崔嵬巨幹拂髙冥天風乍起生竽籟撼屋驚濤忽澎湃雷霆白晝走蛟鼉雲霧中宵見光怪良材自有神明扶下視凡木皆庸奴狄門桃李敢爭艷田氏荆花差可徒楊郎愛之如愛寶四季俱宜夏尤好赤日行天暑不知清陰覆地涼偏早孔明廟前根久枯御史臺中樹亦無何似君家書屋外蕭蕭寒翠兩三株羅郎生子歌羅郎通家良子弟長在豪門偏意氣衣紉藕絲績縷輕扇寫蠅頭字形細才華磊落識時宜早有芳名閭里知不學寒酸腐儒輩肯隨浮薄市㕓兒仗義疏財邁流俗終年只把遺編讀問學淵源推豫章一脈書香要令續昨日驚聞忽捧珠天上麒麟骨格殊美錦斕斒裁襁褓髙閎窈窕挂桑弧桑弧由來表奇瑞清尊綺席犀錢會何人還解聽啼聲先卜異時兒富貴胡子壯遊歌識子壯遊日才華杜樊川揚眉吐英槩逺泛江湖船江湖少俊非凡儔青羅束帶烏貂裘揮金買笑縱歡賞等間到處成淹留淹留從教秋復春身輕富貴若浮雲璚簫度曲對花聽翠被籠香和醉薰家聲意氣誰可及喧呼劇飲爭豪逸飛觴百罰雙妖嬈豈惜纒頭錦盈匹光隂悠悠逝水忙忽看玄鬢點吳霜嬌歌慢舞志終極長揖相知歸故鄉歸來舊態都忘却貌得髙情在林壑獨行只挾琴書隨好境登臨有真樂風流一去散如萍天涯無復尋芳盟鴈門學士妙文翰揮毫莫寫平生情平生情良未足九京若更逢何戡重唱當年渭城曲竹軒歌挺挺餘萬竿亭亭最耐看四時不改青攢攢鳯凰翎綴碧琅玕搖落窮冬木皆墜叢色依然獨蒼翠節上長留六逸詩葉底猶懸七賢珮時人種花媚春暄鼓簫酣賞集華軒高幹凌雲豈解識芳筒叶律詎曾聞憐生瀟灑啚盈卷笑我參差種滿園莫謾學他桃與李開花著子狄公門寄定岩戒上人鍾山老禪精律戒少小為僧今老大菩提非樹鏡非臺比却盧能更超邁諸緣泯絶七情空萬念消磨一性融澗水原同清淨想隴雲渾似去來蹤自言真能忘色相壞帛紉衣枯竹杖飄如海鶴輕如萍遍遊五嶽稀定向片月翛然物外懷行藏不許世人猜布金應隨長者園持鉢或赴龍宫齋知師無求復無著眼前衲子那可學浮生若未斷六根幻軀豈得揮五濁我時雖見宰官身意馬心猿久已馴擬撥懶殘煨芋火蒲團分座話聲塵鍾山樵隱歌為陳徵士致廣作金鏞墜簴知何日化作圓峯翠堪挹就中聞有束薪人絶似飄飄晉王質行歌伐木窺雲泉遇著圍棋世外仙倚樹傍觀未終局斧柯腰下爛多年劃然更作蘇門嘯竒響鏗轟生衆竅恍疑霜夜泊楓橋百八鯨音震岩嶠不識人間利與名優遊勝處樂餘生煙霞放浪忘情久笑殺驕妻會稽守題王母圖御風八駿歸來後世上徒傳白雲調承華祕殿九光燈茂陵五夜清齋候紫氣紅光爛燭天青鳥先將消息傳層霄頃刻阿環降龍顔不及蛾眉鮮初人自與時人異長生之術非難致金盤空食五枚桃笑殺劉郎匪仙器題董生卷董生行年過三八早攻醫術兼筆札扁倉遺緒屢探尋晉唐妙迹頻摹拓鬭雞走狗非爾宜難經書法稍通知揮毫切胍名並馳抄方學帖少暇時潛心積久鎮臨池池波染墨玄凝脂