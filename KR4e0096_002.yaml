此明深𠂻為詢世上簪紱者若箇看花無愧容題張僉憲琦公餘行樂卷河東壤土鄰河南太行峻拔仍尖巉雄藩富盛説全晉放勛萬古遺風覃棗榆連林晚卧犢桑柘繞屋春供蠶素敦勤儉戒奢靡闕鄒與郯苗薅荑稗禾覆隴孰列襟佩書盈函乾坤秀淑罕鍾物産士磊落皆奇男張侯挺生古并郡蚤擅才學青於藍曩為御史跨驄馬名山到處曾遊探晴雲出岫不作雨濕翠飄空都是嵐前年秩滿拜特命持憲江右袪貪婪田間鰥煢失愁嘆廬左桀黠增憂慚發姦擲伏振綱紀明比皎月澄寒潭公餘問俗間出郭屏退軒蓋穿松楠擕琴奚奴俊堪愛髻綰兩髽餘髮毿豺狼望見驚破膽遁迹逺去藏深岩喧啁鼓笛野翁社雜亂語話村農談民情習俗總詢遍老鶴昂首迎歸驂柏庭稚子候門久喜笑競走牽衣衫吾知侯心自有樂惟許點也真非凡咄哉畫手豈解此我亦愧吐辭喃喃聽鶴軒皋禽清唳清無比不入尋常俗流耳虛窗夜讀浮丘經展卷乍聞必為喜一聲兩聲落層霄石頭迸裂空山椒三聲四聲風滿林邃岩幽壑留遺音夢醒松巢忽飛起玄袂生寒露如洗引吭再作五六聲氷拆崖崩月明裏媺哉雅懷逍遙兩間即物窮理遺榮尚間所以惟愛戞然仙驥之長鳴聆之弗厭危坐到更闌絶勝琴操寫入徽絃彈周孟璉六十壽詩璉翁逍遙靜養恬長身玉立仍修髯平生雅好在泉石標格灑落心清亷優間惟許一人獨榮進却讓諸郎兼鳩形刻杖圓類鐡鶴翎製氅輕於縑世上功名久無夢但遇佳境頻留淹追隨老鹿最馴擾見者疑是白玉蟾風杉雪檜隂蔽日滿袖翠濕晴嵐霑笑渠營營行路子赤腳抗走徒趨炎嵗周花甲值初度畫手戲取宣毫拈逡巡忽見壽者相驚駭賀客爭觀瞻椿齡桂算各三百不須更問君平占看教弱水十回淺海屋方把籌重添題石廉使所藏墨梅飛雪送臘盡孤根得春先如何一圖裏見此雙清妍氷資玉質神仙格誰運天機描貌得冉冉寒香似可聞疏疏冷蕊疑堪摘封柯積幹凍未消五出六出皆瓊瑤傍開正吐總絶似厯嵗經時渾不凋何用巡簷索花笑橫幅髙懸恣瞻眺酷好原欣節操同深藏頗惜臨摹妙道傍人暍困塵埃畫就終非療渴材别有真梅著佳實明年調鼎待公來題會乩鄧宗經先生頥老莊灊郊畝畝皆稻田大畦小疃相接連先生豫為休退計剩買百畝荒城邊仍將數畝搆書屋扁以頥老爭誇傳罷官拂袖便居此骯髒肯受虛名纒桃冠芒鞋紫竹杖手版納却軒車懸青襟問奇定載酒白足結社非逃禪寧甘食力事耕耨敢厭誨人拋簡編乘間偶出值野叟稼穯話久因忘還向晚歸家窗户暝酒漿旋設燈初燃芹羮炊香雜薯芋絮被卧暖兼繒綿方知隨處有佳境奚必鏡水稽山妍親朋凋零故鄉逺茲地卜築應前緣相期與君慎終始恐是晚節稀能全叩門昏夜得富貴吁嗟有若乞丐然但當益勵固窮志居易俟命從華顛美人蹴圓圖暑退涼初生秋容淨如洗娉婷事踏踘笑出深閨裏踏踘風流堪適情錦瑟瑤笙教暫停逡巡嚲袖側肩立低昂進退都分明豈無落花泛流水亦有白打分輸贏龍兒擺尾原曾學鳳子搖頭舊已精兩娃嬌並銀盤面傍觀手㺯鮫綃扇三娃正蹴小官場汗濕酥胸渾未倦圓社從來非等間作家取巧憑雙彎眼親步活轉移速解數般般誰道難雕闌十二相繚繞日下芙蓉猶未了髮亂青絲寶髻偏塵生羅襪金蓮小秀色誠可悅清時愼勿辜桂枝香滿榴結子繁華况在神仙都氷紈何用空描寫别有人間真畫圖富溪八景富溪八景何瓌奇王家住此知幾時自從開闢巧排列每一出門皆見之南山雨餘翠蔥蒨黛髻煙鬟照人面萬斛凝嵐結晝隂千尋懸瀑垂晴練西符聳拔如爭雄落日倒挂金盆紅參差樹影互搖動倐忽暝色深遮籠澄潭浸月涼波瑩恍似姮娥對粧鏡驪頷珠輝似可捫鮫機杼響疑堪聽層巔怪石屹不欹上有雲氣長相依晨霞迎旭或為伴曉霧飄空仍共飛三峯五嶺多佳態松顫狂飈乍澎湃旁礡氤氲育俊才鏦錚蕭颯生靈籟文江暖泛緑半篙潛通墨沼添波濤遊魚喜化金鱗鬛浴鷺嫌緇雪羽毛間居已喜專幽處况乃周遭皆雅趣翰苑名公為著文經筵大老能留句先廬亦在折桂鄉白頭未得還耕桑題詩謾重季鷹感鱸鱠秋風歸興長題性靈空卷靈師妙年慧且聰秀眉紺頂氷雪容僰山滇水厯幾重稟法京剎春又冬有大開士幻覺公出世𢎞振臨濟宗千闕楚楚皆象龍鉗錘惡辣加磨礲靈也上首才調豐孤雲野鶴少定蹤遊方翩然西復東笠裁筍皮鞋織棕石頭路滑莓苔封三衣濕透秋露濃行住坐卧伊誰同笑擕明月邀清風寶坊到處多留蹤尊宿乍見驚罕逢不發言句藏機鋒驀地一喝雙耳聾恍若刮翳開昏矇精進幢竪髙崇崇聲聞頓悟性地融安穩自在超凡庸蒲團謾説禪定功輸爾根器僧中雄我慚白髮成衰慵頗似示疾維摩翁勤勤問訊勞過從無座無飯文室空逡巡告别還舊峯聊為説偈明深𠂻天涯目送南飛鴻題山水小景良工寫幽景運思頗不凡髙崖挂懸瀑迥野生輕嵐林昏日欲墜天暝雲初覃逺岸少去舫長途乏來驂摩挲老眼著意看倣佛還似湖湘南憶曾之官屢經此孤舟晚泊浯溪潭葉凋老樹曲偃蹇泉觸亂石森巉岩衆禽歸飛宿且食雄鳴雌應相喃喃平沙巨迹虎新過淺瀨纎鱗鷗競銜荒村無人但猿鳥古嶠有樹皆楓柟空青冥濛翳島嶼濕翠杳靄沾衣衫誰藏一匣在絶壁云是諸葛兵書函雨催風撼只如故欲墮未墮何由探山川奇勝怪仍險况我愛玩性所耽低回但恨弗學畫辜負佳境心徒慚每逢好事輒為説恍若親覩非虛談于今衰老返耕釣鬅鬙兩鬢霜毿毿觀圖忽起舊遊想浩然清興莫可緘題詩卷軸坐歎息中宵夢逐滄江帆題孟浩然踏雪尋梅圖浩然先生生盛唐錦心秀口氷肝腸詞追風雅諧宫商清如環珮鏘珩璜幼鄰摩詰相頡頏子美太白參翺翔私入禁署逢明皇誦詩却誦南山章忤意拂袖還襄陽嬉遊只在雲水鄉間身到處頻徜徉溪山晏嵗梅吐香跨蹇獨出尋孤芳六花亂落紛悠揚老樹翯翯虬龍驤癡童前引凍欲僵回顧似促歸去忙鹿門尚有十里強先生驢背寒都忘吟哦未覺天昏黃開元治世文運昌同時諸子皆俊良惟公製作尤擅場篇篇首首興趣長字字句句金玉相明珠白璧爭焜煌千載不朽垂休光題二守費翎毛圖紫髯别駕才氣雄好詩好畫明且公何人運思寫動植却使造化無全功琅玕欹斜竹交翠錦綺爛熳桃爭紅聫翩羽族競來集機忘意適雌兼雄不聞清香哢啁唽惟見細毳紛蒙茸疾歸奮翅鬬輕快間宿斂翮俱從容艷葩可折禽可籠韶光都在圖畫中飛鳴宿食總人力榮悴開落非天工方知世上有好手筆端所至生春風諦觀此景似何處髙峯南北湖西東買花載酒聽啼鳥老矣未得來相從悅親行楊家矍鑠雙翁媪平生快活無煩惱中男頗解盡歡娛拜跪膝邊顔色好開封百物價直低尋常剩有豚與雞鮮鱗嫩菜好柿栗販來都聚隅頭西買歸為具羅盤飣藥室香凝春晝靜滿斟政喜甕方深迭勸豈愁瓶屢罄况逢禾麥豐登年飯炊稻米衣裝綿頥老惟知足嬉笑安居但願忘憂煎隨緣供養竭醫資且樂清貧慎勿辭不見巷南富豪子禍罪貽親異鄉死贈某將軍少日隨飛龍風雲際良會方今修文治父子功勛遂惟説先君驍且雄雁翎長刀角胎弓單車直驅沙漠外片帆徑渡滄溟東東征西討無不預肯令敵騎留遺蹤馬鞍壓雪耀金甲羽箭流星貫敵胸小河鏖戰河流赤將軍身命那敢惜一死博得千年名象賢有兒承父職皇家褒忠恩禮殊貔貅坐擁專城居將門出將傳奕葉此語由來誠匪虛重圭疊組爭照耀韜鈐更兾曾玄紹間暇投壺復雅歌髙情祭老堪同調莫匣三尺劍還磨丈二矛將軍壯氣死不休吾知燕頷當封侯他時倘建凌煙閣畫像期公登上頭再贈下邳壯節伊誰如談兵早讀孫吳書夜廬母塜輒流血曉陷敵陳隨捐軀西江都帥誇賢子為子為臣亦如此承歡敵愾嗣前人豈直相傳襲金紫大廷寵贈祖父功明威昭勇官資崇碑煩史筆製詞美誥錫奎章題字濃怙恃九原嗟不作想像音容空淚落致養無由奉筍鮭竭誠但願傾葵藿禆校同推智略深親恩國事兩關心吾知燕頷封侯相漢代將軍重見今題梅吳山繞舍栽奇卉幾樹凌寒綻繁蕊同雲黯黯天茫茫朝來素蕚添粉粧繽紛六出亂飛舞似與五出爭妍芳水邊沙際失踈影野外風前飄暗香徐君想是羅浮客慣貌花容染花色酒酣興適弗自珍貴士幽人皆覔得兹圖所寫尤精神正開側吐俱逼真氷肌清瘦最耐冷玉質輕盈不受塵費侯吾知聊托意展玩追懷舊遊地遙憶逋仙莫可招雖逢驛使那堪寄眼中畫手多凡庸八十之年老更工豈必西湖船裏看間齋坐對勝推篷題南溪蕭氏山水小景西昌有士生名宗孤髙格調氷雪容性惟愛山復愛畫畫裏坐對青芙蓉乍觀尺素杳難辨野色川氣相溟濛初疑為巫峽列此十二峯雨餘輕黛增鮮濃陽臺神女倣佛精靈通楚襄之夢恍惚當誰窮沐猿澗鹿悄無迹千岩萬壑煙霏籠又疑是匡廬五老排層穹乃在彭蠡之北盆江之東涼影倒浸波溶溶飛英亂舞垂蘿風吾家翰苑老供奉攬秀絶頂巢雲松錦袍騎鯨乘月徑返蓬萊宫開元諸子莫追逐吐句盡如仙語真孤雄仍聞夙昔讀書處氤氲竟日丹霞封胡君特來索我賦笑迎起抑揩昏瞳便令挂壁著意看其間景象既弗類運思落筆俱凡庸僧繇久逝范寬沒海嶽亦往菴居空南溪别有奇絶地春深緑與耶溪同傑構隱映蒼檜中二三好客勞過從酒醅旋壓黃粱舂幽非桃花源邃異子午谷土美俗朴堪耕農罕曾袖刺謁時貴屢嘗含哺歌年豐我欲擕焦桐飄然謝塵蹤汲泉採蕨療飢渴淨掃白石彈秋鴻如何病兀縶雙足謾令清興蟠心胸揮毫寫罷付君去殷勤寄示蘭陵翁題吳山書舍虎林勝槩聞天下城外城中總堪畫一峯最近是吳山傳道渠家好臺榭其間非藏玉與珠剩有萬卷牙籖儲短檠靜夜樂諷詠小軒永日忘飢劬寸隂那肯輕拋擲及此少年勤致力無暇豈窺董子園不貧寧鑿匡衡壁逢疑必辨理必窮務使曲暢仍旁通知行兼該造成德到此始克收全功古杭人物冠江浙况乃才華邁同列五䇿風簷厯厯陳一枝月桂髙髙折守令為坊立宅邊新題巨扁筆如椽比鄰多少連居者若箇生男似爾賢題雪窗蘭為濟潤上人雪窗前元住虎丘清致倣佛支逺流解將翰墨作遊戲寫成蘭石人爭求露花風葉含生色楚畹移來屏几側乍見頻看若可紉初開半吐疑堪摘潤師戒行如秋霜蒲團趺坐十笏房根塵識想已云泯色香聲味都宜忘兹圖謾爾時時對外物豈能為已纍畢竟閻浮世界空直須悟逗真三昧寒灰心地稿木形妄緣幻質難纒縈無蘭無石亦無畫此是菩提最上乘送劉教諭裔關西考試採玉之行往年採玉于闐東今年採玉崑山中近來苦難得白璧荆珉燕石常相逢世無明眼非無玉水蒼玄英委空谷何限瑰奇不見知豈獨驪珠混魚目君不見琥璜在璞未琢磨云誰識之古卞和運甓漫稿卷二
